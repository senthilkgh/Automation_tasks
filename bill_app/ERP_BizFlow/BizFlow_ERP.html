<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sen ERP</title>
<style>
:root{
  --bg:#0d1117;--sidebar:#161b22;--surface:#1c2128;--surface2:#21262d;
  --border:#30363d;--border2:#444c56;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#2ea043;--accent2:#388bfd;--accent3:#f78166;
  --warn:#d29922;--danger:#f85149;--info:#58a6ff;
  --radius:6px;--radius2:10px;
  --font:'Segoe UI',system-ui,sans-serif;
  --mono:'Consolas','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;height:100vh;overflow:hidden}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* SIDEBAR */
#sidebar{width:220px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
#logo{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
#logo h1{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
#logo p{font-size:10px;color:var(--text3);margin-top:2px}
.nav-group{padding:8px 0}
.nav-label{padding:6px 14px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;border-radius:0;transition:background .15s;color:var(--text2);font-size:12.5px;border-left:3px solid transparent}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--surface);color:var(--accent);border-left-color:var(--accent)}
.nav-item .icon{font-size:14px;width:16px;text-align:center}
.nav-bottom{margin-top:auto;border-top:1px solid var(--border);padding:8px 0}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* TOPBAR */
#topbar{height:48px;background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
#topbar h2{font-size:14px;font-weight:600;flex:1}
#lang-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:var(--radius);font-size:12px;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-size:12px;transition:all .15s;font-family:var(--font)}
.btn:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#2c974b;border-color:#2c974b;color:#fff}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn-danger:hover{opacity:.85;color:#fff}
.btn-sm{padding:3px 8px;font-size:11px}
/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;color:var(--text)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.kpi-up{color:var(--accent)}
.kpi-down{color:var(--danger)}
/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);color:var(--text3);font-size:11px;font-weight:600;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);font-size:12.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.td-num{text-align:right;font-family:var(--mono);font-size:12px}
/* FORMS */
.form-grid{display:grid;gap:12px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
label{font-size:11px;color:var(--text2);font-weight:500}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:var(--radius);font-size:12.5px;font-family:var(--font);width:100%;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent2)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:70px}
/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-green{background:#1a4731;color:#3fb950}
.badge-red{background:#3d1a1a;color:#f85149}
.badge-yellow{background:#3d2e0a;color:#e3b341}
.badge-blue{background:#0d2848;color:#58a6ff}
.badge-gray{background:#21262d;color:#8b949e}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;cursor:pointer;color:var(--text2);font-size:12.5px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.tab-content{display:none}
.tab-content.active{display:block}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--sidebar);border:1px solid var(--border2);border-radius:var(--radius2);width:600px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:14px;font-weight:600}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* ALERTS */
.alert{padding:10px 14px;border-radius:var(--radius);margin-bottom:12px;font-size:12px}
.alert-info{background:#0d2848;border:1px solid #1f4070;color:#58a6ff}
.alert-warn{background:#2d1f00;border:1px solid #5c3f00;color:#e3b341}
.alert-danger{background:#3d0f0f;border:1px solid #5c1a1a;color:#f85149}
.alert-success{background:#0d2e1a;border:1px solid #1a5c33;color:#3fb950}
/* STAT ROW */
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none;font-weight:600;padding-top:10px}
/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.section-header h3{font-size:14px;font-weight:600}
.search-box{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--radius);font-size:12px;width:220px}
.search-box:focus{outline:none;border-color:var(--accent2)}
/* INVOICE */
.invoice-line{display:grid;grid-template-columns:2fr 80px 100px 80px 100px 36px;gap:8px;align-items:center;margin-bottom:6px}
.invoice-line-header{display:grid;grid-template-columns:2fr 80px 100px 80px 100px 36px;gap:8px;margin-bottom:4px}
.invoice-total{background:var(--surface2);border-radius:var(--radius);padding:12px 16px;margin-top:12px}
/* GST COLORS */
.cgst{color:#58a6ff}.sgst{color:#3fb950}.igst{color:#e3b341}
/* CHART BAR */
.chart-bar-wrap{display:flex;flex-direction:column;gap:6px}
.chart-bar-row{display:flex;align-items:center;gap:10px}
.chart-bar-label{font-size:11px;color:var(--text2);width:70px;text-align:right}
.chart-bar-track{flex:1;height:16px;background:var(--surface2);border-radius:3px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.chart-bar-val{font-size:11px;color:var(--text3);width:80px;font-family:var(--mono)}
/* AUDIT */
.audit-entry{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.audit-time{color:var(--text3);font-family:var(--mono);min-width:130px;font-size:11px}
.audit-module{min-width:80px}
.audit-msg{color:var(--text2)}
/* PRINT */
@media print{
  #sidebar,#topbar,.no-print{display:none!important}
  #content{overflow:visible}
  body{background:#fff;color:#000}
  .card{border:1px solid #ccc}
}
/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{width:48px;min-width:48px}
  .nav-item span,.nav-label,#logo p,#logo h1{display:none}
  .nav-item{justify-content:center;padding:10px}
}
/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease}
/* LANG SPECIFIC */
.lang-content{display:none}
.lang-content.active{display:block}
</style>

function load(k,def=[]){ try{return JSON.parse(localStorage.getItem('erp_'+k))||def;}catch{return def;} }
function save(k,v){ localStorage.setItem('erp_'+k,JSON.stringify(v)); }

let DB = {
  get settings(){ return load('settings',{company:'My Company',gstin:'',address:'',fy:'2024-25',currency:'₹',theme:'dark'}); },
  get parties(){ return load('parties',[]); },
  get items(){ return load('items',[]); },
  get sales(){ return load('sales',[]); },
  get purchases(){ return load('purchases',[]); },
  get journals(){ return load('journals',[]); },
  get accounts(){ return load('accounts',[]); },
  get auditlog(){ return load('auditlog',[]); },
};

function saveDB(k,v){ save(k,v); }

function addAudit(module, action, desc){
  const log = load('auditlog',[]);
  log.unshift({id:Date.now(),time:new Date().toLocaleString(),module,action,desc,user:'Admin'});
  if(log.length>500) log.splice(500);
  save('auditlog',log);
}

function fmt(n){ const s=DB.settings; return (s.currency||'₹')+parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtNum(n){ return parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function today(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

let currentModule='dashboard';
function showModule(mod){
  currentModule=mod;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('onclick')===`showModule('${mod}')`);
  });
  const titles={dashboard:'menu_dashboard',accounts:'menu_accounts',journal:'menu_journal',reports:'menu_reports',sales:'menu_sales',purchase:'menu_purchase',parties:'menu_parties',stock:'menu_stock',stockreg:'menu_stockreg',gst:'menu_gst',importexport:'menu_importexport',audit:'menu_audit',settings:'menu_settings'};
  document.getElementById('page-title').textContent=t(titles[mod]||'menu_dashboard');
  const renders={dashboard:renderDashboard,accounts:renderAccounts,journal:renderJournal,reports:renderReports,sales:renderSales,purchase:renderPurchase,parties:renderParties,stock:renderStock,stockreg:renderStockReg,gst:renderGST,importexport:renderImportExport,audit:renderAudit,settings:renderSettings};
  const fn=renders[mod];
  if(fn) { document.getElementById('content').innerHTML='<div class="fade-in">'; fn(); document.getElementById('content').innerHTML+='</div>'; fn(); }
}

//  DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDashboard(){
  const sales=load('sales',[]);
  const purchases=load('purchases',[]);
  const items=load('items',[]);
  const totalSales=sales.reduce((a,s)=>a+s.grandTotal,0);
  const totalPurch=purchases.reduce((a,p)=>a+p.grandTotal,0);
  const receivable=sales.filter(s=>s.status==='unpaid').reduce((a,s)=>a+s.grandTotal,0);
  const payable=purchases.filter(p=>p.status==='unpaid').reduce((a,p)=>a+p.grandTotal,0);
  const stockVal=items.reduce((a,i)=>a+(i.currentQty*i.rate),0);
  const profit=totalSales-totalPurch;
  const lowStock=items.filter(i=>i.currentQty<=i.reorder);
  const s=DB.settings;
  document.getElementById('company-name').textContent=s.company;
  document.getElementById('fy-label').textContent='FY: '+s.fy;

  // Monthly chart data
  const months=['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];
  const now=new Date(); const cm=now.getMonth();
  const salesByMonth=Array(12).fill(0);
  sales.forEach(s=>{ const m=new Date(s.date).getMonth(); const idx=(m-3+12)%12; salesByMonth[idx]+=s.grandTotal; });
  const maxS=Math.max(...salesByMonth,1);
  const chartBars=months.map((m,i)=>`
    <div class="chart-bar-row">
      <div class="chart-bar-label">${m}</div>
      <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${(salesByMonth[i]/maxS*100).toFixed(1)}%;background:var(--accent)"></div></div>
      <div class="chart-bar-val">${fmt(salesByMonth[i])}</div>
    </div>`).join('');

  const recentSales=sales.slice(-5).reverse().map(s=>`
    <tr><td>${s.invNo}</td><td>${s.date}</td><td>${s.partyName}</td>
    <td class="td-num">${fmt(s.grandTotal)}</td>
    <td><span class="badge badge-${s.status==='paid'?'green':s.status==='unpaid'?'red':'yellow'}">${t(s.status)}</span></td></tr>`).join('');

  const lowStockRows=lowStock.map(i=>`
    <tr><td>${i.name}</td><td class="td-num">${i.currentQty} ${i.unit}</td><td class="td-num">${i.reorder}</td>
    <td><span class="badge badge-red">${t('low_stock')}</span></td></tr>`).join('');

  document.getElementById('content').innerHTML=`
  <div class="fade-in">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">${t('dash_sales')}</div><div class="kpi-value kpi-up">${fmt(totalSales)}</div><div class="kpi-sub">${sales.length} invoices</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_purchase')}</div><div class="kpi-value kpi-down">${fmt(totalPurch)}</div><div class="kpi-sub">${purchases.length} bills</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_receivable')}</div><div class="kpi-value" style="color:var(--warn)">${fmt(receivable)}</div><div class="kpi-sub">${sales.filter(s=>s.status==='unpaid').length} pending</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_payable')}</div><div class="kpi-value" style="color:var(--danger)">${fmt(payable)}</div><div class="kpi-sub">${purchases.filter(p=>p.status==='unpaid').length} pending</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_stock_val')}</div><div class="kpi-value" style="color:var(--info)">${fmt(stockVal)}</div><div class="kpi-sub">${items.length} items</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_profit')}</div><div class="kpi-value ${profit>=0?'kpi-up':'kpi-down'}">${fmt(profit)}</div><div class="kpi-sub">This FY</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card">
      <div class="card-title">${t('dash_sales')} - Monthly Trend</div>
      <div class="chart-bar-wrap">${chartBars}</div>
    </div>
    <div class="card">
      <div class="card-title">Quick Actions</div>

function newParty(){

}
function editParty(id){

  openModal(`${t('edit')} ${t('menu_parties')}`,partyForm(p),
    `<button class="btn" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn btn-primary" onclick="saveParty('${id}')">${t('save')}</button>`);
}
function saveParty(id=null){

  const items=load('items',[]);

      <td>${i.name}</td><td>${i.cat||'-'}</td><td>${i.unit}</td>

      <td>${low?'<span class="badge badge-red">Low</span>':'<span class="badge badge-green">OK</span>'}</td>
      <td><button class="btn btn-sm" onclick="editItem('${i.id}')">${t('edit')}</button>
          <button class="btn btn-sm btn-danger" onclick="delItem('${i.id}')">${t('del')}</button></td>

function itemForm(i={}){
  return `<div class="form-grid form-grid-2">

    <div class="form-group"><label>${t('stock_cat')}</label><input id="f-cat" value="${i.cat||''}"/></div>
    <div class="form-group"><label>${t('stock_unit')}</label><select id="f-unit">
      ${['Pcs','Kg','Ltr','Mtr','Box','Bag','Set','Nos'].map(u=>`<option ${i.unit===u?'selected':''}>${u}</option>`).join('')}

function newItem(){
  openModal(`+ ${t('add')} ${t('menu_stock')}`,itemForm(),
    `<button class="btn" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn btn-primary" onclick="saveItem()">${t('save')}</button>`);
}
function editItem(id){
  const i=load('items',[]).find(x=>x.id===id);
  openModal(`${t('edit')} ${t('menu_stock')}`,itemForm(i),
    `<button class="btn" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn btn-primary" onclick="saveItem('${id}')">${t('save')}</button>`);
}
function saveItem(id=null){
  const name=document.getElementById('f-iname').value.trim();
  if(!name)return;
  const items=load('items',[]);
  const oqty=parseFloat(document.getElementById('f-oqty').value)||0;
  const rate=parseFloat(document.getElementById('f-rate').value)||0;
  const existing=id?items.find(x=>x.id===id):null;
  const rec={id:id||uid(),name,cat:document.getElementById('f-cat').value,unit:document.getElementById('f-unit').value,rate,gstRate:parseFloat(document.getElementById('f-gstrate').value),hsn:document.getElementById('f-hsn').value,openQty:oqty,openRate:rate,currentQty:id?existing.currentQty:oqty,reorder:parseFloat(document.getElementById('f-reorder').value)||0};
  if(id){const i=items.findIndex(x=>x.id===id);items[i]=rec;}else{items.push(rec);}
  save('items',items); addAudit('Stock',id?'Edit':'Add',`Item: ${name}`); closeModal(); renderStock();
}
function delItem(id){
  if(!confirm(t('confirm_del')))return;
  save('items',load('items',[]).filter(i=>i.id!==id));
  addAudit('Stock','Delete',`ID: ${id}`); renderStock();
}

// ═══════════════════════════════════════════════════════
function renderStockReg(){
  const items=load('items',[]);
  const sales=load('sales',[]);
  const purchases=load('purchases',[]);
  const rows=items.map(i=>{
    const soldQty=sales.reduce((a,s)=>a+s.lines.filter(l=>l.itemId===i.id).reduce((b,l)=>b+l.qty,0),0);
    const boughtQty=purchases.reduce((a,p)=>a+p.lines.filter(l=>l.itemId===i.id).reduce((b,l)=>b+l.qty,0),0);
    const closing=i.openQty+boughtQty-soldQty;
    return `<tr><td>${i.name}</td><td>${i.unit}</td>
      <td class="td-num">${i.openQty}</td>
      <td class="td-num" style="color:var(--accent)">${boughtQty}</td>
      <td class="td-num" style="color:var(--danger)">${soldQty}</td>
      <td class="td-num" style="font-weight:600">${closing}</td>
      <td class="td-num">${fmt(i.rate)}</td>
      <td class="td-num">${fmt(closing*i.rate)}</td>
    </tr>`;}).join('');
  const totalVal=items.reduce((a,i)=>a+i.currentQty*i.rate,0);
  document.getElementById('content').innerHTML=`
  <div class="section-header"><h3>${t('menu_stockreg')}</h3>
    <button class="btn" onclick="exportTableCSV('stock-reg-table','Stock_Register')">${t('export_csv')}</button>
  </div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table id="stock-reg-table">
    <thead><tr><th>${t('stock_name')}</th><th>${t('stock_unit')}</th>
    <th style="text-align:right">${t('opening')}</th><th style="text-align:right">Inward</th>
    <th style="text-align:right">Outward</th><th style="text-align:right">Closing</th>
    <th style="text-align:right">${t('stock_rate')}</th><th style="text-align:right">${t('stock_val')}</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr style="font-weight:600;background:var(--surface2)">
      <td colspan="7">Total Stock Value</td><td class="td-num">${fmt(totalVal)}</td>
    </tr></tfoot>
  </table></div></div>`;
}
</script>
<script>
// ═══════════════════════════════════════════════════════
//  SALES
// ═══════════════════════════════════════════════════════
let saleLines=[];
function renderSales(){
  const sales=load('sales',[]);
  const total=sales.reduce((a,s)=>a+s.grandTotal,0);
  const rows=sales.slice().reverse().map(s=>`<tr>
    <td>${s.invNo}</td><td>${s.date}</td><td>${s.partyName}</td>
    <td class="td-num">${fmt(s.taxable)}</td>
    <td class="td-num cgst">${fmt(s.cgst)}</td>
    <td class="td-num sgst">${fmt(s.sgst)}</td>
    <td class="td-num igst">${fmt(s.igst)}</td>
    <td class="td-num" style="font-weight:600">${fmt(s.grandTotal)}</td>
    <td><span class="badge badge-${s.status==='paid'?'green':s.status==='unpaid'?'red':'yellow'}">${t(s.status)}</span></td>
    <td style="white-space:nowrap">
      <button class="btn btn-sm" onclick="viewInvoice('${s.id}','sale')">&nbsp;View&nbsp;</button>
      <button class="btn btn-sm" onclick="editSale('${s.id}')">${t('edit')}</button>
      <button class="btn btn-sm btn-danger" onclick="delSale('${s.id}')">${t('del')}</button>
    </td></tr>`).join('')||`<tr><td colspan="10" style="text-align:center;color:var(--text3)">${t('no_data')}</td></tr>`;
  document.getElementById('content').innerHTML=`
  <div class="section-header"><h3>${t('sales_reg')}</h3>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="exportTableCSV('sales-table','Sales_Register')">${t('export_csv')}</button>
      <button class="btn btn-primary" onclick="newSale()">+ New Invoice</button>
    </div>
  </div>
  <div class="kpi-grid" style="margin-bottom:16px">
    <div class="kpi"><div class="kpi-label">Total Sales</div><div class="kpi-value kpi-up">${fmt(total)}</div></div>
    <div class="kpi"><div class="kpi-label">Invoices</div><div class="kpi-value">${sales.length}</div></div>
    <div class="kpi"><div class="kpi-label">Pending</div><div class="kpi-value kpi-down">${fmt(sales.filter(s=>s.status==='unpaid').reduce((a,s)=>a+s.grandTotal,0))}</div></div>
    <div class="kpi"><div class="kpi-label">Total GST Collected</div><div class="kpi-value" style="color:var(--info)">${fmt(sales.reduce((a,s)=>a+s.totalGst,0))}</div></div>
  </div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table id="sales-table">
    <thead><tr><th>${t('inv_no')}</th><th>${t('date')}</th><th>${t('party')}</th>
    <th style="text-align:right">${t('taxable')}</th>
    <th style="text-align:right">${t('cgst')}</th><th style="text-align:right">${t('sgst')}</th><th style="text-align:right">${t('igst')}</th>
    <th style="text-align:right">${t('total')}</th><th>${t('status')}</th><th>${t('actions')}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
}
function nextInvNo(prefix,list,field){
  const nums=list.map(x=>parseInt((x[field]||'0').replace(/\D/g,''))).filter(n=>!isNaN(n));
  const next=(nums.length?Math.max(...nums):0)+1;
  return prefix+String(next).padStart(3,'0');
}
function newSale(){
  saleLines=[{itemId:'',itemName:'',qty:1,rate:0,disc:0,gstRate:5,amount:0,gstAmt:0,total:0}];
  const parties=load('parties',[]).filter(p=>p.type==='customer'||p.type==='both');
  const invNo=nextInvNo('SI-',load('sales',[]),'invNo');
  openModal('New Sales Invoice',saleModal(invNo,parties),
    `<button class="btn" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn btn-primary" onclick="saveSale()">${t('save')}</button>`);
  calcSaleTotals();
}
function editSale(id){
  const sales=load('sales',[]);const s=sales.find(x=>x.id===id);
  saleLines=s.lines.map(l=>({...l}));
  const parties=load('parties',[]).filter(p=>p.type==='customer'||p.type==='both');
  openModal('Edit Invoice',saleModal(s.invNo,parties,s),
    `<button class="btn" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn btn-primary" onclick="saveSale('${id}')">${t('save')}</button>`);
  calcSaleTotals();
}
function saleModal(invNo,parties,s={}){
  const pOpts=parties.map(p=>`<option value="${p.id}" ${s.partyId===p.id?'selected':''}>${p.name}</option>`).join('');
  return `<div class="form-grid form-grid-3" style="margin-bottom:12px">
    <div class="form-group"><label>${t('inv_no')}</label><input id="s-invno" value="${invNo}"/></div>
    <div class="form-group"><label>${t('date')}</label><input id="s-date" type="date" value="${s.date||today()}"/></div>
    <div class="form-group"><label>${t('party')}</label><select id="s-party">${pOpts}</select></div>
  </div>
  <div class="invoice-line-header" style="font-size:10px;color:var(--text3);text-transform:uppercase;padding:0 0 4px">
    <span>${t('item')}</span><span>${t('qty')}</span><span>${t('rate')}</span><span>${t('disc')}%</span><span>GST%</span><span></span>
  </div>
  <div id="sale-lines">${saleLines.map((l,i)=>saleLineHTML(l,i)).join('')}</div>
  <button class="btn btn-sm" style="margin:8px 0" onclick="addSaleLine()">+ Add Line</button>
  <div id="sale-totals" class="invoice-total"></div>
  <div class="form-grid form-grid-2" style="margin-top:12px">
    <div class="form-group"><label>${t('status')}</label><select id="s-status">
      <option value="paid" ${s.status==='paid'?'selected':''}>${t('paid')}</option>
      <option value="unpaid" ${s.status==='unpaid'?'selected':''}>${t('unpaid')}</option>
      <option value="partial" ${s.status==='partial'?'selected':''}>${t('partial')}</option>
    </select></div>
    <div class="form-group"><label>${t('narration')}</label><input id="s-notes" value="${s.notes||''}"/></div>
  </div>`;
}
function saleLineHTML(l,i){
  const items=load('items',[]);
  const iOpts=items.map(x=>`<option value="${x.id}" data-rate="${x.rate}" data-gst="${x.gstRate}" ${l.itemId===x.id?'selected':''}>${x.name}</option>`).join('');
  return `<div class="invoice-line" id="sl-${i}">
    <select onchange="updateSaleLine(${i},this)" style="width:100%"><option value="">-- Select --</option>${iOpts}</select>
    <input type="number" value="${l.qty}" min="0.01" step="0.01" oninput="saleLines[${i}].qty=+this.value;calcSaleTotals()" style="width:100%"/>
    <input type="number" value="${l.rate}" step="0.01" oninput="saleLines[${i}].rate=+this.value;calcSaleTotals()" style="width:100%"/>
    <input type="number" value="${l.disc||0}" min="0" max="100" oninput="saleLines[${i}].disc=+this.value;calcSaleTotals()" style="width:100%"/>
    <select onchange="saleLines[${i}].gstRate=+this.value;calcSaleTotals()" style="width:100%">
      ${[0,3,5,12,18,28].map(r=>`<option value="${r}" ${l.gstRate===r?'selected':''}>${r}%</option>`).join('')}
    </select>
    <button class="btn btn-sm btn-danger" onclick="removeSaleLine(${i})" style="padding:4px 6px">&#10005;</button>
  </div>`;
}
function updateSaleLine(i,sel){
  const opt=sel.selectedOptions[0];
  saleLines[i].itemId=sel.value;
  saleLines[i].itemName=opt.textContent;
  saleLines[i].rate=parseFloat(opt.dataset.rate)||0;
  saleLines[i].gstRate=parseFloat(opt.dataset.gst)||0;
  calcSaleTotals();
  document.getElementById('sale-lines').innerHTML=saleLines.map((l,j)=>saleLineHTML(l,j)).join('');
}
function addSaleLine(){
  saleLines.push({itemId:'',itemName:'',qty:1,rate:0,disc:0,gstRate:5,amount:0,gstAmt:0,total:0});
  document.getElementById('sale-lines').innerHTML=saleLines.map((l,i)=>saleLineHTML(l,i)).join('');
  calcSaleTotals();
}
function removeSaleLine(i){
  saleLines.splice(i,1);
  document.getElementById('sale-lines').innerHTML=saleLines.map((l,j)=>saleLineHTML(l,j)).join('');
  calcSaleTotals();
}
function calcSaleTotals(){
  let sub=0,disc=0,taxable=0,cgst=0,sgst=0,igst=0;
  saleLines.forEach(l=>{
    const amt=l.qty*l.rate; const d=amt*l.disc/100;
    const tax=amt-d; const g=tax*l.gstRate/100;
    l.amount=amt; l.gstAmt=g; l.total=tax+g;
    sub+=amt; disc+=d; taxable+=tax; cgst+=g/2; sgst+=g/2;
  });
  const grand=taxable+cgst+sgst+igst;
  const el=document.getElementById('sale-totals');
  if(el) el.innerHTML=`
    <div class="stat-row"><span>${t('amount')}</span><span>${fmt(sub)}</span></div>
    <div class="stat-row"><span>Discount</span><span style="color:var(--danger)">- ${fmt(disc)}</span></div>
    <div class="stat-row"><span>${t('taxable')}</span><span>${fmt(taxable)}</span></div>
    <div class="stat-row"><span class="cgst">CGST</span><span class="cgst">${fmt(cgst)}</span></div>

function saveSale(id=null){
  const partyEl=document.getElementById('s-party');
  const partyId=partyEl.value;
  const partyName=partyEl.selectedOptions[0]?.textContent||'';
  if(!partyId||saleLines.length===0){alert('Select party and at least one item');return;}
  const sales=load('sales',[]);
  let sub=0,disc=0,taxable=0,cgst=0,sgst=0,igst=0;
  saleLines.forEach(l=>{const amt=l.qty*l.rate;const d=amt*l.disc/100;const tax=amt-d;const g=tax*l.gstRate/100;sub+=amt;disc+=d;taxable+=tax;cgst+=g/2;sgst+=g/2;});
  const rec={id:id||uid(),invNo:document.getElementById('s-invno').value,date:document.getElementById('s-date').value,partyId,partyName,lines:saleLines,subTotal:sub,discAmt:disc,taxable,cgst,sgst,igst,totalGst:cgst+sgst,grandTotal:taxable+cgst+sgst,status:document.getElementById('s-status').value,notes:document.getElementById('s-notes').value};
  if(id){const i=sales.findIndex(x=>x.id===id);sales[i]=rec;}else{sales.push(rec);}
  // Update stock
  const items=load('items',[]);
  saleLines.forEach(l=>{const idx=items.findIndex(x=>x.id===l.itemId);if(idx>=0){if(!id)items[idx].currentQty=Math.max(0,items[idx].currentQty-l.qty);}});
  save('items',items);
  save('sales',sales); addAudit('Sales',id?'Edit':'Add',`Invoice: ${rec.invNo} | ${partyName} | ${fmt(rec.grandTotal)}`); closeModal(); renderSales();
}
function delSale(id){
  if(!confirm(t('confirm_del')))return;
  save('sales',load('sales',[]).filter(s=>s.id!==id));
  addAudit('Sales','Delete',`ID: ${id}`); renderSales();
}

function newPurchase(){
  purchLines=[{itemId:'',itemName:'',qty:1,rate:0,disc:0,gstRate:5,amount:0,gstAmt:0,total:0}];

function purchModal(billNo,parties,p={}){
  const pOpts=parties.map(x=>`<option value="${x.id}" ${p.partyId===x.id?'selected':''}>${x.name}</option>`).join('');
  return `<div class="form-grid form-grid-3" style="margin-bottom:12px">
    <div class="form-group"><label>${t('bill_no')}</label><input id="p-billno" value="${billNo}"/></div>

function purchLineHTML(l,i){
  const items=load('items',[]);
  const iOpts=items.map(x=>`<option value="${x.id}" data-rate="${x.rate}" data-gst="${x.gstRate}" ${l.itemId===x.id?'selected':''}>${x.name}</option>`).join('');
  return `<div class="invoice-line" id="pl-${i}">
    <select onchange="updatePurchLine(${i},this)" style="width:100%"><option value="">-- Select --</option>${iOpts}</select>
    <input type="number" value="${l.qty}" min="0.01" step="0.01" oninput="purchLines[${i}].qty=+this.value;calcPurchTotals()" style="width:100%"/>
    <input type="number" value="${l.rate}" step="0.01" oninput="purchLines[${i}].rate=+this.value;calcPurchTotals()" style="width:100%"/>
    <input type="number" value="${l.disc||0}" oninput="purchLines[${i}].disc=+this.value;calcPurchTotals()" style="width:100%"/>
    <select onchange="purchLines[${i}].gstRate=+this.value;calcPurchTotals()" style="width:100%">
      ${[0,3,5,12,18,28].map(r=>`<option value="${r}" ${l.gstRate===r?'selected':''}>${r}%</option>`).join('')}
    </select>
    <button class="btn btn-sm btn-danger" onclick="purchLines.splice(${i},1);document.getElementById('purch-lines').innerHTML=purchLines.map((l,j)=>purchLineHTML(l,j)).join('');calcPurchTotals()" style="padding:4px 6px">&#10005;</button>
  </div>`;
}
function updatePurchLine(i,sel){
  const opt=sel.selectedOptions[0];
  purchLines[i].itemId=sel.value; purchLines[i].itemName=opt.textContent;
  purchLines[i].rate=parseFloat(opt.dataset.rate)||0;
  purchLines[i].gstRate=parseFloat(opt.dataset.gst)||0;
  calcPurchTotals();
  document.getElementById('purch-lines').innerHTML=purchLines.map((l,j)=>purchLineHTML(l,j)).join('');
}
function addPurchLine(){
  purchLines.push({itemId:'',itemName:'',qty:1,rate:0,disc:0,gstRate:5});
  document.getElementById('purch-lines').innerHTML=purchLines.map((l,i)=>purchLineHTML(l,i)).join('');
  calcPurchTotals();
}
function calcPurchTotals(){
  let sub=0,disc=0,taxable=0,cgst=0,sgst=0;
  purchLines.forEach(l=>{const amt=l.qty*l.rate;const d=amt*l.disc/100;const tax=amt-d;const g=tax*l.gstRate/100;sub+=amt;disc+=d;taxable+=tax;cgst+=g/2;sgst+=g/2;});
  const el=document.getElementById('purch-totals');
  if(el) el.innerHTML=`
    <div class="stat-row"><span>${t('amount')}</span><span>${fmt(sub)}</span></div>
    <div class="stat-row"><span>Discount</span><span>- ${fmt(disc)}</span></div>
    <div class="stat-row"><span>${t('taxable')}</span><span>${fmt(taxable)}</span></div>
    <div class="stat-row"><span class="cgst">CGST</span><span class="cgst">${fmt(cgst)}</span></div>
    <div class="stat-row"><span class="sgst">SGST</span><span class="sgst">${fmt(sgst)}</span></div>
    <div class="stat-row"><span style="font-size:14px">${t('total')}</span><span style="font-size:16px;font-weight:700">${fmt(taxable+cgst+sgst)}</span></div>`;
}
function savePurch(){
  const partyEl=document.getElementById('p-party');
  const partyId=partyEl.value; const partyName=partyEl.selectedOptions[0]?.textContent||'';
  if(!partyId||purchLines.length===0){alert('Select party and at least one item');return;}
  const purchases=load('purchases',[]);
  let sub=0,disc=0,taxable=0,cgst=0,sgst=0;
  purchLines.forEach(l=>{const amt=l.qty*l.rate;const d=amt*l.disc/100;const tax=amt-d;const g=tax*l.gstRate/100;sub+=amt;disc+=d;taxable+=tax;cgst+=g/2;sgst+=g/2;});
  const rec={id:uid(),billNo:document.getElementById('p-billno').value,date:document.getElementById('p-date').value,partyId,partyName,lines:purchLines,subTotal:sub,discAmt:disc,taxable,cgst,sgst,igst:0,totalGst:cgst+sgst,grandTotal:taxable+cgst+sgst,status:document.getElementById('p-status').value};
  purchases.push(rec);
  // Update stock
  const items=load('items',[]);
  purchLines.forEach(l=>{const idx=items.findIndex(x=>x.id===l.itemId);if(idx>=0)items[idx].currentQty+=l.qty;});
  save('items',items);
  save('purchases',purchases); addAudit('Purchase','Add',`Bill: ${rec.billNo} | ${partyName} | ${fmt(rec.grandTotal)}`); closeModal(); renderPurchase();
}
function delPurch(id){
  if(!confirm(t('confirm_del')))return;
  save('purchases',load('purchases',[]).filter(p=>p.id!==id));
  addAudit('Purchase','Delete',`ID: ${id}`); renderPurchase();
}

function renderGST(){
  const sales=load('sales',[]); const purchases=load('purchases',[]);
  const taxable=sales.reduce((a,s)=>a+s.taxable,0);
  const cgstOut=sales.reduce((a,s)=>a+s.cgst,0);

  const cgstIn=purchases.reduce((a,p)=>a+p.cgst,0);
  const sgstIn=purchases.reduce((a,p)=>a+p.sgst,0);

  // HSN summary
  const items=load('items',[]); const hsnMap={};

    <div class="kpi"><div class="kpi-label">Input CGST Credit</div><div class="kpi-value" style="color:var(--text2)">${fmt(cgstIn)}</div></div>
    <div class="kpi"><div class="kpi-label">Input SGST Credit</div><div class="kpi-value" style="color:var(--text2)">${fmt(sgstIn)}</div></div>
    <div class="kpi"><div class="kpi-label">Net CGST Payable</div><div class="kpi-value" style="color:${netCgst>0?'var(--danger)':'var(--accent)'}">${fmt(Math.abs(netCgst))}</div></div>
    <div class="kpi"><div class="kpi-label">Net SGST Payable</div><div class="kpi-value" style="color:${netSgst>0?'var(--danger)':'var(--accent)'}">${fmt(Math.abs(netSgst))}</div></div>

      <thead><tr><th>${t('inv_no')}</th><th>${t('date')}</th><th>${t('party')}</th>

function exportData(key){
  const data=load(key,[]);
  if(!data.length){alert('No data to export');return;}
  const headers=Object.keys(data[0]).filter(k=>k!=='lines'&&k!=='entries');
  const csv=[headers.join(','),...data.map(row=>headers.map(h=>{
    const v=row[h];
    if(typeof v==='string'&&(v.includes(',')|| v.includes('"')))return '"'+v.replace(/"/g,'""')+'"';
    return v??'';
  }).join(','))].join('\n');
  downloadFile(csv,`${key}_export_${today()}.csv`,'text/csv');
  addAudit('Import/Export','Export',`Exported ${key} - ${data.length} records`);
}
function exportAllJSON(){
  const backup={settings:DB.settings,parties:load('parties',[]),items:load('items',[]),sales:load('sales',[]),purchases:load('purchases',[]),accounts:load('accounts',[]),journals:load('journals',[]),exportDate:new Date().toISOString()};
  downloadFile(JSON.stringify(backup,null,2),`bizflow_backup_${today()}.json`,'application/json');
  addAudit('Import/Export','Backup','Full JSON backup exported');
}
function importJSON(event){
  const file=event.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.parties) save('parties',data.parties);
      if(data.items) save('items',data.items);
      if(data.sales) save('sales',data.sales);
      if(data.purchases) save('purchases',data.purchases);
      if(data.accounts) save('accounts',data.accounts);
      if(data.journals) save('journals',data.journals);
      addAudit('Import/Export','Restore','Full backup restored');
      alert('Backup restored successfully! Refreshing...');
      location.reload();
    }catch(err){alert('Invalid JSON file: '+err.message);}
  };
  reader.readAsText(file);
}
function importCSV(event,key){
  const file=event.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    if(lines.length<2){alert('Empty CSV');return;}
    const headers=lines[0].split(',');
    const records=lines.slice(1).map(line=>{
      const vals=line.split(',');
      const obj={};
      headers.forEach((h,i)=>{ obj[h.trim()]=vals[i]?.trim()||''; });
      if(!obj.id) obj.id=uid();
      return obj;
    });
    const existing=load(key,[]);
    save(key,[...existing,...records]);
    addAudit('Import/Export','Import',`Imported ${records.length} records into ${key}`);
    alert(`Imported ${records.length} records!`);
  };
  reader.readAsText(file);
}
function exportTableCSV(tableId,filename){
  const table=document.getElementById(tableId);
  if(!table){alert('Table not found');return;}
  const rows=Array.from(table.querySelectorAll('tr')).map(tr=>
    Array.from(tr.querySelectorAll('th,td')).map(td=>'"'+td.innerText.replace(/"/g,'""')+'"').join(',')
  ).join('\n');
  downloadFile(rows,`${filename}_${today()}.csv`,'text/csv');
}
function downloadFile(content,filename,mime){
  const blob=new Blob([content],{type:mime});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}

      <div id="settings-msg" style="margin-top:8px;font-size:12px;color:var(--accent)"></div>
    </div>
    <div class="card">
      <div class="card-title">GST Rate Configuration</div>
      <div class="alert alert-info">GST rates are set per item. Supported: 0%, 3%, 5%, 12%, 18%, 28%</div>
      <div style="margin-top:12px">
        <div class="card-title" style="margin-top:12px">Data Management</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
          <button class="btn" onclick="showModule('importexport')">Import / Export Data</button>
          <button class="btn btn-danger" onclick="resetAllData()">Reset All Data (Factory Reset)</button>
        </div>
      </div>
      <div style="margin-top:16px">
        <div class="card-title">About BizFlow ERP</div>
        <p style="font-size:12px;color:var(--text2);margin-top:8px;line-height:1.7">
          BizFlow ERP v2.0<br>
          Modules: Accounts, Stock, Sales, Purchase, GST, Reports, Audit<br>
          Languages: English, Hindi, Tamil, Telugu, Kannada, Malayalam, Gujarati, Marathi<br>
          Data stored locally in browser (localStorage)<br>
          No server required - works completely offline
        </p>
      </div>
    </div>
  </div>`;
}
function saveSettings(){
  const s={company:document.getElementById('set-company').value,gstin:document.getElementById('set-gstin').value,address:document.getElementById('set-address').value,fy:document.getElementById('set-fy').value,currency:document.getElementById('set-currency').value};
  save('settings',s);
  document.getElementById('company-name').textContent=s.company;
  document.getElementById('fy-label').textContent='FY: '+s.fy;
  document.getElementById('settings-msg').textContent=t('settings_saved');
  addAudit('Settings','Edit','Company settings updated');
  setTimeout(()=>{ const el=document.getElementById('settings-msg'); if(el)el.textContent=''; },3000);
}
function resetAllData(){
  if(!confirm('WARNING: This will delete ALL data permanently. Type RESET to confirm.')) return;
  const inp=prompt('Type RESET to confirm:');
  if(inp!=='RESET') return;
  ['settings','parties','items','sales','purchases','accounts','journals','auditlog','seeded'].forEach(k=>localStorage.removeItem('erp_'+k));
  addAudit('System','Reset','Factory reset performed');
  alert('All data cleared. Reloading...');
  location.reload();
}

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
seedIfEmpty();
const s=DB.settings;
document.getElementById('company-name').textContent=s.company;
document.getElementById('fy-label').textContent='FY: '+s.fy;
applyLang();
showModule('dashboard');
</script>
