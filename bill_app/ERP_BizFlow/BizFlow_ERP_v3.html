<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sen BizFlow ERP v3.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0a0e14;--sidebar:#0f1520;--surface:#141c28;--surface2:#1a2235;--surface3:#202a3d;
  --border:#1e2d45;--border2:#2a3f5f;
  --text:#d4e4f7;--text2:#7a9bbf;--text3:#4a6280;
  --accent:#00d4ff;--accent2:#0099cc;--accent3:#ff6b35;
  --warn:#f5a623;--danger:#ff4757;--info:#00d4ff;--success:#00e676;
  --radius:4px;--radius2:8px;
  --font:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono','Consolas',monospace;
  --logo-h:48px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* SIDEBAR */
#sidebar{width:216px;min-width:216px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:width .2s}
#logo{padding:14px 12px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
#logo-img-wrap{width:36px;height:36px;flex-shrink:0;border-radius:6px;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;border:1px solid var(--border2)}
#logo-img-wrap img{width:100%;height:100%;object-fit:contain}
#logo-text h1{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-.5px;font-family:var(--mono)}
#logo-text p{font-size:10px;color:var(--text3);margin-top:1px}
.nav-group{padding:6px 0}
.nav-label{padding:5px 12px;font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;color:var(--text2);font-size:12px;border-left:2px solid transparent;transition:all .15s;position:relative}
.nav-item:hover{background:var(--surface);color:var(--text);border-left-color:var(--border2)}
.nav-item.active{background:var(--surface);color:var(--accent);border-left-color:var(--accent)}
.nav-item.locked{opacity:.4;cursor:not-allowed}
.nav-item.locked::after{content:'🔒';font-size:9px;position:absolute;right:8px;opacity:.6}
.nav-item .icon{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.nav-bottom{margin-top:auto;border-top:1px solid var(--border);padding:6px 0}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* TOPBAR */
#topbar{height:46px;background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
#topbar h2{font-size:13px;font-weight:600;flex:1;font-family:var(--mono);color:var(--accent)}
.topbar-co{font-size:11px;color:var(--text3);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#lang-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:var(--radius);font-size:11px;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-size:11.5px;transition:all .15s;font-family:var(--font);white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.btn-primary:hover{background:#00bbdd;border-color:#00bbdd;color:#000}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn-danger:hover{opacity:.85;color:#fff}
.btn-warn{background:var(--warn);border-color:var(--warn);color:#000;font-weight:600}
.btn-success{background:var(--success);border-color:var(--success);color:#000;font-weight:600}
.btn-sm{padding:3px 8px;font-size:11px}
/* CONTENT */
#content{flex:1;overflow-y:auto;padding:16px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:14px;margin-bottom:14px}
.card-title{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.kpi-label{font-size:10px;color:var(--text3);margin-bottom:5px;font-family:var(--mono)}
.kpi-value{font-size:20px;font-weight:700;color:var(--text);font-family:var(--mono)}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px}
.kpi-up{color:var(--success)}
.kpi-down{color:var(--danger)}
/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);color:var(--text3);font-size:10px;font-weight:600;padding:7px 9px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono)}
td{padding:7px 9px;border-bottom:1px solid var(--border);color:var(--text);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.td-num{text-align:right;font-family:var(--mono);font-size:11.5px}
/* FORMS */
.form-grid{display:grid;gap:10px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:3px}
label{font-size:10px;color:var(--text2);font-weight:500;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 9px;border-radius:var(--radius);font-size:12px;font-family:var(--font);width:100%;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:60px}
/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em}
.badge-green{background:#002a1a;color:#00e676;border:1px solid #005a35}
.badge-red{background:#2a0010;color:#ff4757;border:1px solid #5a0020}
.badge-yellow{background:#2a1800;color:#f5a623;border:1px solid #5a3500}
.badge-blue{background:#001a2a;color:#00d4ff;border:1px solid #003a5a}
.badge-gray{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:7px 14px;cursor:pointer;color:var(--text2);font-size:11.5px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:var(--mono)}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--sidebar);border:1px solid var(--border2);border-radius:var(--radius2);width:640px;max-width:96vw;max-height:92vh;overflow-y:auto}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--accent)}
.modal-body{padding:18px}
.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* ALERTS */
.alert{padding:9px 12px;border-radius:var(--radius);margin-bottom:10px;font-size:11.5px}
.alert-info{background:#001a2a;border:1px solid #003a5a;color:#00d4ff}
.alert-warn{background:#2a1800;border:1px solid #5a3500;color:#f5a623}
.alert-danger{background:#2a0010;border:1px solid #5a0020;color:#ff4757}
.alert-success{background:#002a1a;border:1px solid #005a35;color:#00e676}
/* STAT ROW */
.stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none;font-weight:600;padding-top:8px}
/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.section-header h3{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text)}
.search-box{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:var(--radius);font-size:11.5px;width:200px}
.search-box:focus{outline:none;border-color:var(--accent)}
/* INVOICE */
.invoice-line{display:grid;grid-template-columns:2fr 70px 95px 70px 85px 30px;gap:6px;align-items:center;margin-bottom:5px}
.invoice-line-header{display:grid;grid-template-columns:2fr 70px 95px 70px 85px 30px;gap:6px;margin-bottom:3px}
.invoice-total{background:var(--surface2);border-radius:var(--radius);padding:10px 14px;margin-top:10px;border:1px solid var(--border)}
/* CHART BAR */
.chart-bar-wrap{display:flex;flex-direction:column;gap:5px}
.chart-bar-row{display:flex;align-items:center;gap:8px}
.chart-bar-label{font-size:10px;color:var(--text2);width:28px;text-align:right;font-family:var(--mono)}
.chart-bar-track{flex:1;height:14px;background:var(--surface2);border-radius:2px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.chart-bar-val{font-size:10px;color:var(--text3);width:75px;font-family:var(--mono)}
/* AUDIT */
.audit-entry{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:11.5px}
.audit-time{color:var(--text3);font-family:var(--mono);min-width:125px;font-size:10px}
/* SECTION PERM CARD */
.perm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:14px;margin-bottom:10px}
.perm-card.enabled{border-color:var(--accent);background:rgba(0,212,255,.04)}
.perm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.perm-title{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--text)}
.perm-desc{font-size:11px;color:var(--text3);line-height:1.5}
.perm-modules{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
/* TOGGLE */
.toggle{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--surface3);border-radius:20px;transition:.3s;border:1px solid var(--border2)}
.toggle-slider::before{content:'';position:absolute;height:14px;width:14px;left:2px;bottom:2px;background:var(--text3);border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:var(--accent);border-color:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px);background:#000}
/* LOGO UPLOAD AREA */
.logo-upload-area{border:2px dashed var(--border2);border-radius:var(--radius2);padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.logo-upload-area:hover{border-color:var(--accent);background:rgba(0,212,255,.04)}
.logo-preview{width:80px;height:80px;object-fit:contain;border-radius:6px;border:1px solid var(--border2);background:var(--surface2)}
/* DB INFO */
.db-info-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.db-info-row:last-child{border-bottom:none}
.db-key{color:var(--text2);font-family:var(--mono);font-size:11px}
.db-val{color:var(--accent);font-family:var(--mono);font-size:11px}
/* BACKUP */
.backup-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.backup-step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.backup-step-content h4{font-size:12px;font-weight:600;margin-bottom:3px}
.backup-step-content p{font-size:11px;color:var(--text3);line-height:1.5}
/* GST COLORS */
.cgst{color:#00d4ff}.sgst{color:#00e676}.igst{color:#f5a623}
/* PRINT STYLES */
@media print{
  #sidebar,#topbar,.no-print,button{display:none!important}
  body{background:#fff;color:#000;font-family:Arial,sans-serif}
  #content{overflow:visible;padding:0}
  .card{border:1px solid #ccc;background:#fff;page-break-inside:avoid}
  .print-invoice{display:block!important}
  .modal-overlay{position:relative!important;background:none!important}
  .modal{border:none!important;max-height:none!important;width:100%!important}
  .modal-header,.modal-footer{display:none!important}
  th,td{color:#000!important}
  .kpi{border:1px solid #ccc;background:#fff}
  .kpi-value,.kpi-label,.kpi-sub{color:#000!important}
  .badge-green,.badge-red,.badge-yellow,.badge-blue,.badge-gray{color:#000!important;background:#eee!important;border:1px solid #ccc!important}
}
/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .18s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}
/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{width:44px;min-width:44px}
  .nav-item span:not(.icon),.nav-label,#logo-text{display:none}
  .nav-item{justify-content:center;padding:9px}
}
</style>

// ═══════════════════════════════════
//  DATA STORE (localStorage as simple JSON DB)
// ═══════════════════════════════════
/*
  DB FORMAT: All data is stored in localStorage with key prefix 'erp_'
  File equivalent mapping (for export/backup):
    erp_settings   → bizflow_settings.json
    erp_parties    → bizflow_parties.json
    erp_items      → bizflow_items.json
    erp_sales      → bizflow_sales.json
    erp_purchases  → bizflow_purchases.json
    erp_accounts   → bizflow_accounts.json
    erp_journals   → bizflow_journals.json
    erp_auditlog   → bizflow_auditlog.json
    erp_permissions→ bizflow_permissions.json
    erp_logo       → bizflow_logo.b64 (base64 image)
  
  Full backup file: bizflow_backup_YYYY-MM-DD.bfbak (JSON with checksum)
*/
function load(k,def=[]){try{return JSON.parse(localStorage.getItem('erp_'+k))||def;}catch{return def;}}
function save(k,v){localStorage.setItem('erp_'+k,JSON.stringify(v));}

  get settings(){return load('settings',{company:'My Company',gstin:'',address:'',fy:'2024-25',currency:'₹',logoData:''});},
  get parties(){return load('parties',[]);},
  get items(){return load('items',[]);},
  get sales(){return load('sales',[]);},
  get purchases(){return load('purchases',[]);},
  get journals(){return load('journals',[]);},
  get accounts(){return load('accounts',[]);},

};

// Module → permission key mapping
const modPerms={
  accounts:'accounts',journal:'accounts',reports:'accounts',
  sales:'sales',purchase:'purchase',parties:'parties',
  stock:'inventory',stockreg:'inventory',
  gst:'gst',importexport:'importexport',audit:'audit',
  dashboard:null,settings:null,backup:null
};

function checkPerm(mod){
  const permKey=modPerms[mod];
  if(!permKey)return true;
  return DB.permissions[permKey]?.enabled!==false;
}

function addAudit(module,action,desc){
  const log=load('auditlog',[]);
  log.unshift({id:Date.now(),time:new Date().toLocaleString(),module,action,desc,user:'Admin'});
  if(log.length>500)log.splice(500);
  save('auditlog',log);
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function applyPermissionsToNav(){
  const perms=DB.permissions;
  const map={
    'nav-accounts':'accounts','nav-journal':'accounts','nav-reports':'accounts',
    'nav-sales':'sales','nav-purchase':'purchase','nav-parties':'parties',
    'nav-stock':'inventory','nav-stockreg':'inventory',
    'nav-gst':'gst','nav-importexport':'importexport','nav-audit':'audit'
  };
  Object.entries(map).forEach(([navId,permKey])=>{
    const el=document.getElementById(navId);
    if(!el)return;
    const enabled=perms[permKey]?.enabled!==false;
    el.classList.toggle('locked',!enabled);
  });
}

function tryNav(mod){
  if(!checkPerm(mod)){
    showToast(t('module_locked'),'warn');
    return;
  }
  showModule(mod);
}

function openModal(title,body,footer=''){
  document.getElementById('modal-title').textContent=title;

  document.getElementById('modal-footer').innerHTML=footer;

}
function closeModal(){document.getElementById('modal').classList.remove('open');}

// ═══════════════════════════════════
//  TOAST NOTIFICATIONS
// ═══════════════════════════════════
function showToast(msg,type='info'){
  let container=document.getElementById('toast-container');
  if(!container){container=document.createElement('div');container.id='toast-container';container.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px';document.body.appendChild(container);}
  const toast=document.createElement('div');
  const colors={info:'#001a2a;color:#00d4ff;border:1px solid #003a5a',warn:'#2a1800;color:#f5a623;border:1px solid #5a3500',danger:'#2a0010;color:#ff4757;border:1px solid #5a0020',success:'#002a1a;color:#00e676;border:1px solid #005a35'};
  toast.style.cssText=`background:${colors[type]||colors.info};padding:10px 16px;border-radius:6px;font-size:12px;font-family:var(--mono);max-width:300px;animation:fadeIn .2s ease`;
  toast.textContent=msg;
  container.appendChild(toast);
  setTimeout(()=>toast.remove(),3500);
}

// ═══════════════════════════════════
//  MODULE ROUTER
// ═══════════════════════════════════
let currentModule='dashboard';
function showModule(mod){
  currentModule=mod;
  document.querySelectorAll('.nav-item').forEach(el=>{
    const onclick=el.getAttribute('onclick')||'';
    el.classList.toggle('active',onclick.includes(`'${mod}'`)||onclick.includes(`"${mod}"`));
  });
  const titles={dashboard:'menu_dashboard',accounts:'menu_accounts',journal:'menu_journal',reports:'menu_reports',sales:'menu_sales',purchase:'menu_purchase',parties:'menu_parties',stock:'menu_stock',stockreg:'menu_stockreg',gst:'menu_gst',importexport:'menu_importexport',audit:'menu_audit',settings:'menu_settings',backup:'Backup & Recovery'};
  const tkey=titles[mod];
  document.getElementById('page-title').textContent=tkey?(tkey.startsWith('menu_')||LANGS.en[tkey]?t(tkey):tkey):mod;
  const renders={dashboard:renderDashboard,accounts:renderAccounts,journal:renderJournal,reports:renderReports,sales:renderSales,purchase:renderPurchase,parties:renderParties,stock:renderStock,stockreg:renderStockReg,gst:renderGST,importexport:renderImportExport,audit:renderAudit,settings:renderSettings,backup:renderBackup};
  const fn=renders[mod];
  if(fn){document.getElementById('content').innerHTML='';fn();}
}

function getLogoHTML(size=60,forPrint=false){

}

function updateSidebarLogo(){
  const s=DB.settings;
  const logoData=s.logoData||localStorage.getItem('erp_logoData')||'';
  const img=document.getElementById('sidebar-logo');
  const ph=document.getElementById('logo-placeholder');
  if(logoData&&img){img.src=logoData;img.style.display='block';if(ph)ph.style.display='none';}
  else if(img){img.style.display='none';if(ph)ph.style.display='block';}
}

function renderDashboard(){
  const sales=load('sales',[]);
  const purchases=load('purchases',[]);
  const items=load('items',[]);
  const perms=DB.permissions;
  const totalSales=perms.sales?.enabled!==false?sales.reduce((a,s)=>a+s.grandTotal,0):0;
  const totalPurch=perms.purchase?.enabled!==false?purchases.reduce((a,p)=>a+p.grandTotal,0):0;
  const receivable=perms.sales?.enabled!==false?sales.filter(s=>s.status==='unpaid').reduce((a,s)=>a+s.grandTotal,0):0;
  const payable=perms.purchase?.enabled!==false?purchases.filter(p=>p.status==='unpaid').reduce((a,p)=>a+p.grandTotal,0):0;
  const stockVal=perms.inventory?.enabled!==false?items.reduce((a,i)=>a+(i.currentQty*i.rate),0):0;
  const profit=totalSales-totalPurch;
  const lowStock=items.filter(i=>i.currentQty<=i.reorder);
  const s=DB.settings;
  document.getElementById('company-name').textContent=s.company;
  document.getElementById('fy-label').textContent='FY: '+s.fy;
  updateSidebarLogo();
  const months=['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];
  const salesByMonth=Array(12).fill(0);
  if(perms.sales?.enabled!==false)sales.forEach(s=>{const m=new Date(s.date).getMonth();const idx=(m-3+12)%12;salesByMonth[idx]+=s.grandTotal;});
  const maxS=Math.max(...salesByMonth,1);
  const chartBars=months.map((m,i)=>`
    <div class="chart-bar-row">
      <div class="chart-bar-label">${m}</div>
      <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${(salesByMonth[i]/maxS*100).toFixed(1)}%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div>
      <div class="chart-bar-val">${fmt(salesByMonth[i])}</div>
    </div>`).join('');
  const recentSales=perms.sales?.enabled!==false?sales.slice(-5).reverse().map(s=>`
    <tr><td>${s.invNo}</td><td>${s.date}</td><td>${s.partyName}</td>
    <td class="td-num">${fmt(s.grandTotal)}</td>
    <td><span class="badge badge-${s.status==='paid'?'green':s.status==='unpaid'?'red':'yellow'}">${t(s.status)}</span></td></tr>`).join(''):'';
  const lowStockRows=lowStock.map(i=>`
    <tr><td>${i.name}</td><td class="td-num">${i.currentQty} ${i.unit}</td><td class="td-num">${i.reorder}</td>
    <td><span class="badge badge-red">Low</span></td></tr>`).join('');
  // Quick action buttons based on permissions
  const qaBtns=[
    perms.sales?.enabled!==false?`<button class="btn btn-primary" onclick="showModule('sales');setTimeout(newSale,100)">+ New Sales Invoice</button>`:'',
    perms.purchase?.enabled!==false?`<button class="btn" onclick="showModule('purchase');setTimeout(newPurchase,100)">+ New Purchase Bill</button>`:'',
    perms.accounts?.enabled!==false?`<button class="btn" onclick="showModule('journal');setTimeout(newJournal,100)">+ Journal Entry</button>`:'',
    perms.parties?.enabled!==false?`<button class="btn" onclick="showModule('parties');setTimeout(newParty,100)">+ Add Party</button>`:'',
    perms.inventory?.enabled!==false?`<button class="btn" onclick="showModule('stock');setTimeout(newItem,100)">+ Add Stock Item</button>`:'',
    perms.accounts?.enabled!==false?`<button class="btn" onclick="showModule('reports')">View Reports</button>`:'',
  ].filter(Boolean).join('');
  document.getElementById('content').innerHTML=`
  <div class="fade-in">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">${t('dash_sales')}</div><div class="kpi-value kpi-up">${fmt(totalSales)}</div><div class="kpi-sub">${sales.length} invoices</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_purchase')}</div><div class="kpi-value kpi-down">${fmt(totalPurch)}</div><div class="kpi-sub">${purchases.length} bills</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_receivable')}</div><div class="kpi-value" style="color:var(--warn)">${fmt(receivable)}</div><div class="kpi-sub">${sales.filter(s=>s.status==='unpaid').length} pending</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_payable')}</div><div class="kpi-value" style="color:var(--danger)">${fmt(payable)}</div><div class="kpi-sub">${purchases.filter(p=>p.status==='unpaid').length} pending</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_stock_val')}</div><div class="kpi-value" style="color:var(--info)">${fmt(stockVal)}</div><div class="kpi-sub">${items.length} items</div></div>
    <div class="kpi"><div class="kpi-label">${t('dash_profit')}</div><div class="kpi-value ${profit>=0?'kpi-up':'kpi-down'}">${fmt(profit)}</div><div class="kpi-sub">This FY</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:14px">
    <div class="card">
      <div class="card-title">Sales — Monthly Trend</div>
      <div class="chart-bar-wrap">${chartBars}</div>
    </div>
    <div class="card">
      <div class="card-title">Quick Actions</div>
      <div style="display:flex;flex-direction:column;gap:7px">${qaBtns||'<p style="color:var(--text3);font-size:12px">Enable modules in Settings to see actions.</p>'}</div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="card">
      <div class="card-title">Recent Sales</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>${t('inv_no')}</th><th>${t('date')}</th><th>${t('party')}</th><th style="text-align:right">${t('total')}</th><th>${t('status')}</th></tr></thead>
        <tbody>${recentSales||`<tr><td colspan="5" style="text-align:center;color:var(--text3)">${t('no_data')}</td></tr>`}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="card-title">${t('low_stock')} ${lowStock.length>0?'<span class="badge badge-red">'+lowStock.length+'</span>':''}</div>
      ${lowStock.length>0?`<div class="tbl-wrap"><table>
        <thead><tr><th>${t('item')}</th><th style="text-align:right">In Stock</th><th style="text-align:right">Reorder</th><th>Alert</th></tr></thead>
        <tbody>${lowStockRows}</tbody>
      </table></div>`:`<div style="color:var(--text3);text-align:center;padding:20px;font-size:12px">✓ All stock levels healthy</div>`}
    </div>
  </div>
  </div>`;
}

function newParty(){openModal(`+ ${t('add')} ${t('menu_parties')}`,partyForm(),`<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveParty()">${t('save')}</button>`);}
function editParty(id){const p=load('parties',[]).find(x=>x.id===id);openModal(`${t('edit')} ${t('menu_parties')}`,partyForm(p),`<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveParty('${id}')">${t('save')}</button>`);}
function saveParty(id=null){
  const name=document.getElementById('f-name').value.trim();if(!name){alert(t('name')+' required');return;}
  const parties=load('parties',[]);
  const rec={id:id||uid(),name,type:document.getElementById('f-type').value,phone:document.getElementById('f-phone').value,email:document.getElementById('f-email').value,gstin:document.getElementById('f-gstin').value,address:document.getElementById('f-address').value};
  if(id){const i=parties.findIndex(x=>x.id===id);parties[i]=rec;}else{parties.push(rec);}
  save('parties',parties);addAudit('Parties',id?'Edit':'Add',`Party: ${name}`);closeModal();renderParties();
}
function delParty(id){if(!confirm(t('confirm_del')))return;save('parties',load('parties',[]).filter(p=>p.id!==id));addAudit('Parties','Delete',`ID: ${id}`);renderParties();}

function newItem(){openModal(`+ ${t('add')} ${t('menu_stock')}`,itemForm(),`<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveItem()">${t('save')}</button>`);}
function editItem(id){const i=load('items',[]).find(x=>x.id===id);openModal(`${t('edit')} ${t('menu_stock')}`,itemForm(i),`<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveItem('${id}')">${t('save')}</button>`);}
function saveItem(id=null){
  const name=document.getElementById('f-iname').value.trim();if(!name)return;
  const items=load('items',[]);
  const oqty=parseFloat(document.getElementById('f-oqty').value)||0;
  const rate=parseFloat(document.getElementById('f-rate').value)||0;
  const existing=id?items.find(x=>x.id===id):null;
  const rec={id:id||uid(),name,cat:document.getElementById('f-cat').value,unit:document.getElementById('f-unit').value,rate,gstRate:parseFloat(document.getElementById('f-gstrate').value),hsn:document.getElementById('f-hsn').value,openQty:oqty,openRate:rate,currentQty:id?existing.currentQty:oqty,reorder:parseFloat(document.getElementById('f-reorder').value)||0};
  if(id){const i=items.findIndex(x=>x.id===id);items[i]=rec;}else{items.push(rec);}
  save('items',items);addAudit('Stock',id?'Edit':'Add',`Item: ${name}`);closeModal();renderStock();
}
function delItem(id){if(!confirm(t('confirm_del')))return;save('items',load('items',[]).filter(i=>i.id!==id));addAudit('Stock','Delete',`ID: ${id}`);renderStock();}

// ═══════════════════════════════════
//  STOCK REGISTER
// ═══════════════════════════════════
function renderStockReg(){
  const items=load('items',[]);const sales=load('sales',[]);const purchases=load('purchases',[]);
  const rows=items.map(i=>{
    const soldQty=sales.reduce((a,s)=>a+s.lines.filter(l=>l.itemId===i.id).reduce((b,l)=>b+l.qty,0),0);
    const boughtQty=purchases.reduce((a,p)=>a+p.lines.filter(l=>l.itemId===i.id).reduce((b,l)=>b+l.qty,0),0);
    const closing=i.openQty+boughtQty-soldQty;
    return `<tr><td>${i.name}</td><td>${i.unit}</td>
      <td class="td-num">${i.openQty}</td>
      <td class="td-num" style="color:var(--success)">${boughtQty}</td>
      <td class="td-num" style="color:var(--danger)">${soldQty}</td>
      <td class="td-num" style="font-weight:600">${closing}</td>
      <td class="td-num">${fmt(i.rate)}</td>
      <td class="td-num">${fmt(closing*i.rate)}</td>
    </tr>`;}).join('');
  const totalVal=items.reduce((a,i)=>a+i.currentQty*i.rate,0);
  document.getElementById('content').innerHTML=`
  <div class="section-header"><h3>${t('menu_stockreg')}</h3>
    <button class="btn" onclick="exportTableCSV('stock-reg-table','Stock_Register')">${t('export_csv')}</button>
  </div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table id="stock-reg-table">
    <thead><tr><th>${t('stock_name')}</th><th>${t('stock_unit')}</th>
    <th style="text-align:right">${t('opening')}</th><th style="text-align:right">Inward</th>
    <th style="text-align:right">Outward</th><th style="text-align:right">Closing</th>
    <th style="text-align:right">${t('stock_rate')}</th><th style="text-align:right">${t('stock_val')}</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr style="font-weight:700;background:var(--surface2)">
      <td colspan="7">Total Stock Value</td><td class="td-num">${fmt(totalVal)}</td>
    </tr></tfoot>
  </table></div></div>`;
}
</script>
<script>
// ═══════════════════════════════════
//  SALES
// ═══════════════════════════════════
let saleLines=[];
function renderSales(){
  const sales=load('sales',[]);
  const rows=sales.slice().reverse().map(s=>`<tr>
    <td>${s.invNo}</td><td>${s.date}</td><td>${s.partyName}</td>
    <td class="td-num">${fmt(s.taxable)}</td>
    <td class="td-num cgst">${fmt(s.cgst)}</td>
    <td class="td-num sgst">${fmt(s.sgst)}</td>
    <td class="td-num" style="font-weight:600">${fmt(s.grandTotal)}</td>
    <td><span class="badge badge-${s.status==='paid'?'green':s.status==='unpaid'?'red':'yellow'}">${t(s.status)}</span></td>
    <td style="white-space:nowrap">
      <button class="btn btn-sm" onclick="viewInvoice('${s.id}','sale')">View</button>
      <button class="btn btn-sm" onclick="editSale('${s.id}')">${t('edit')}</button>
      <button class="btn btn-sm btn-danger" onclick="delSale('${s.id}')">${t('del')}</button>
    </td></tr>`).join('')||`<tr><td colspan="9" style="text-align:center;color:var(--text3)">${t('no_data')}</td></tr>`;
  document.getElementById('content').innerHTML=`
  <div class="section-header"><h3>${t('sales_reg')}</h3>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="exportTableCSV('sales-table','Sales_Register')">${t('export_csv')}</button>
      <button class="btn btn-primary" onclick="newSale()">+ New Invoice</button>
    </div>
  </div>
  <div class="kpi-grid" style="margin-bottom:14px">
    <div class="kpi"><div class="kpi-label">Total Sales</div><div class="kpi-value kpi-up">${fmt(sales.reduce((a,s)=>a+s.grandTotal,0))}</div></div>
    <div class="kpi"><div class="kpi-label">Invoices</div><div class="kpi-value">${sales.length}</div></div>
    <div class="kpi"><div class="kpi-label">Pending</div><div class="kpi-value kpi-down">${fmt(sales.filter(s=>s.status==='unpaid').reduce((a,s)=>a+s.grandTotal,0))}</div></div>
    <div class="kpi"><div class="kpi-label">GST Collected</div><div class="kpi-value" style="color:var(--info)">${fmt(sales.reduce((a,s)=>a+s.totalGst,0))}</div></div>
  </div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table id="sales-table">
    <thead><tr><th>${t('inv_no')}</th><th>${t('date')}</th><th>${t('party')}</th>
    <th style="text-align:right">${t('taxable')}</th>
    <th style="text-align:right">${t('cgst')}</th><th style="text-align:right">${t('sgst')}</th>
    <th style="text-align:right">${t('total')}</th><th>${t('status')}</th><th>${t('actions')}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
}
function nextInvNo(prefix,list,field){
  const nums=list.map(x=>parseInt((x[field]||'0').replace(/\D/g,''))).filter(n=>!isNaN(n));
  return prefix+String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
}
function newSale(){
  saleLines=[{itemId:'',itemName:'',qty:1,rate:0,disc:0,gstRate:5,amount:0,gstAmt:0,total:0}];
  const parties=load('parties',[]).filter(p=>p.type==='customer'||p.type==='both');
  openModal('New Sales Invoice',saleModal(nextInvNo('SI-',load('sales',[]),'invNo'),parties),
    `<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveSale()">${t('save')}</button>`);
  calcSaleTotals();
}
function editSale(id){
  const s=load('sales',[]).find(x=>x.id===id);saleLines=s.lines.map(l=>({...l}));
  const parties=load('parties',[]).filter(p=>p.type==='customer'||p.type==='both');
  openModal('Edit Invoice',saleModal(s.invNo,parties,s),
    `<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveSale('${id}')">${t('save')}</button>`);
  calcSaleTotals();
}
function saleModal(invNo,parties,s={}){
  const pOpts=parties.map(p=>`<option value="${p.id}" ${s.partyId===p.id?'selected':''}>${p.name}</option>`).join('');
  return `<div class="form-grid form-grid-3" style="margin-bottom:10px">
    <div class="form-group"><label>${t('inv_no')}</label><input id="s-invno" value="${invNo}"/></div>
    <div class="form-group"><label>${t('date')}</label><input id="s-date" type="date" value="${s.date||today()}"/></div>
    <div class="form-group"><label>${t('party')}</label><select id="s-party"><option value="">-- Select Party --</option>${pOpts}</select></div>
  </div>
  <div style="font-size:9px;display:grid;grid-template-columns:2fr 70px 95px 70px 85px 30px;gap:6px;color:var(--text3);text-transform:uppercase;padding:0 0 3px;font-family:var(--mono)">
    <span>${t('item')}</span><span>${t('qty')}</span><span>${t('rate')}</span><span>${t('disc')}%</span><span>GST%</span><span></span>
  </div>
  <div id="sale-lines">${saleLines.map((l,i)=>saleLineHTML(l,i)).join('')}</div>
  <button class="btn btn-sm" style="margin:7px 0" onclick="addSaleLine()">+ Add Line</button>
  <div id="sale-totals" class="invoice-total"></div>
  <div class="form-grid form-grid-2" style="margin-top:10px">
    <div class="form-group"><label>${t('status')}</label><select id="s-status">
      <option value="paid" ${s.status==='paid'?'selected':''}>${t('paid')}</option>
      <option value="unpaid" ${s.status==='unpaid'?'selected':''}>${t('unpaid')}</option>
      <option value="partial" ${s.status==='partial'?'selected':''}>${t('partial')}</option>
    </select></div>
    <div class="form-group"><label>${t('narration')}</label><input id="s-notes" value="${s.notes||''}"/></div>
  </div>`;
}
function saleLineHTML(l,i){
  const items=load('items',[]);
  const iOpts=items.map(x=>`<option value="${x.id}" data-rate="${x.rate}" data-gst="${x.gstRate}" ${l.itemId===x.id?'selected':''}>${x.name}</option>`).join('');
  return `<div class="invoice-line" id="sl-${i}">
    <select onchange="updateSaleLine(${i},this)" style="width:100%"><option value="">-- Select --</option>${iOpts}</select>
    <input type="number" value="${l.qty}" min="0.01" step="0.01" oninput="saleLines[${i}].qty=+this.value;calcSaleTotals()" style="width:100%"/>
    <input type="number" value="${l.rate}" step="0.01" oninput="saleLines[${i}].rate=+this.value;calcSaleTotals()" style="width:100%"/>
    <input type="number" value="${l.disc||0}" min="0" max="100" oninput="saleLines[${i}].disc=+this.value;calcSaleTotals()" style="width:100%"/>
    <select onchange="saleLines[${i}].gstRate=+this.value;calcSaleTotals()" style="width:100%">
      ${[0,3,5,12,18,28].map(r=>`<option value="${r}" ${l.gstRate===r?'selected':''}>${r}%</option>`).join('')}
    </select>
    <button class="btn btn-sm btn-danger" onclick="removeSaleLine(${i})" style="padding:3px 5px">✕</button>
  </div>`;
}
function updateSaleLine(i,sel){
  const opt=sel.selectedOptions[0];
  saleLines[i].itemId=sel.value;saleLines[i].itemName=opt.textContent;
  saleLines[i].rate=parseFloat(opt.dataset.rate)||0;saleLines[i].gstRate=parseFloat(opt.dataset.gst)||0;
  calcSaleTotals();document.getElementById('sale-lines').innerHTML=saleLines.map((l,j)=>saleLineHTML(l,j)).join('');
}
function addSaleLine(){saleLines.push({itemId:'',itemName:'',qty:1,rate:0,disc:0,gstRate:5,amount:0,gstAmt:0,total:0});document.getElementById('sale-lines').innerHTML=saleLines.map((l,i)=>saleLineHTML(l,i)).join('');calcSaleTotals();}
function removeSaleLine(i){saleLines.splice(i,1);document.getElementById('sale-lines').innerHTML=saleLines.map((l,j)=>saleLineHTML(l,j)).join('');calcSaleTotals();}
function calcSaleTotals(){
  let sub=0,disc=0,taxable=0,cgst=0,sgst=0;
  saleLines.forEach(l=>{const amt=l.qty*l.rate;const d=amt*l.disc/100;const tax=amt-d;const g=tax*l.gstRate/100;l.amount=amt;l.gstAmt=g;l.total=tax+g;sub+=amt;disc+=d;taxable+=tax;cgst+=g/2;sgst+=g/2;});
  const el=document.getElementById('sale-totals');
  if(el)el.innerHTML=`
    <div class="stat-row"><span>${t('amount')}</span><span>${fmt(sub)}</span></div>
    <div class="stat-row"><span>Discount</span><span style="color:var(--danger)">- ${fmt(disc)}</span></div>
    <div class="stat-row"><span>${t('taxable')}</span><span>${fmt(taxable)}</span></div>
    <div class="stat-row"><span class="cgst">CGST</span><span class="cgst">${fmt(cgst)}</span></div>
    <div class="stat-row"><span class="sgst">SGST</span><span class="sgst">${fmt(sgst)}</span></div>
    <div class="stat-row"><span style="font-size:13px">${t('total')}</span><span style="font-size:15px;font-weight:700">${fmt(taxable+cgst+sgst)}</span></div>`;
}
function saveSale(id=null){
  const partyEl=document.getElementById('s-party');
  if(!partyEl.value||saleLines.length===0){alert('Select party and at least one item');return;}
  const sales=load('sales',[]);
  let sub=0,disc=0,taxable=0,cgst=0,sgst=0;
  saleLines.forEach(l=>{const amt=l.qty*l.rate;const d=amt*l.disc/100;const tax=amt-d;const g=tax*l.gstRate/100;sub+=amt;disc+=d;taxable+=tax;cgst+=g/2;sgst+=g/2;});
  const rec={id:id||uid(),invNo:document.getElementById('s-invno').value,date:document.getElementById('s-date').value,partyId:partyEl.value,partyName:partyEl.selectedOptions[0]?.textContent||'',lines:saleLines,subTotal:sub,discAmt:disc,taxable,cgst,sgst,igst:0,totalGst:cgst+sgst,grandTotal:taxable+cgst+sgst,status:document.getElementById('s-status').value,notes:document.getElementById('s-notes').value};
  if(id){const i=sales.findIndex(x=>x.id===id);sales[i]=rec;}else{sales.push(rec);}
  const items=load('items',[]);
  if(!id)saleLines.forEach(l=>{const idx=items.findIndex(x=>x.id===l.itemId);if(idx>=0)items[idx].currentQty=Math.max(0,items[idx].currentQty-l.qty);});
  save('items',items);save('sales',sales);addAudit('Sales',id?'Edit':'Add',`Invoice: ${rec.invNo} | ${rec.partyName} | ${fmt(rec.grandTotal)}`);closeModal();renderSales();
}
function delSale(id){if(!confirm(t('confirm_del')))return;save('sales',load('sales',[]).filter(s=>s.id!==id));addAudit('Sales','Delete',`ID: ${id}`);renderSales();}

let purchLines=[];
function renderPurchase(){

  const rows=purchases.slice().reverse().map(p=>`<tr>

  <div class="kpi-grid" style="margin-bottom:14px">
    <div class="kpi"><div class="kpi-label">Total Purchase</div><div class="kpi-value kpi-down">${fmt(purchases.reduce((a,p)=>a+p.grandTotal,0))}</div></div>
    <div class="kpi"><div class="kpi-label">Bills</div><div class="kpi-value">${purchases.length}</div></div>
    <div class="kpi"><div class="kpi-label">Pending</div><div class="kpi-value" style="color:var(--warn)">${fmt(purchases.filter(p=>p.status==='unpaid').reduce((a,p)=>a+p.grandTotal,0))}</div></div>
    <div class="kpi"><div class="kpi-label">GST Input Credit</div><div class="kpi-value" style="color:var(--info)">${fmt(purchases.reduce((a,p)=>a+p.totalGst,0))}</div></div>
  </div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table id="purch-table">
    <thead><tr><th>${t('bill_no')}</th><th>${t('date')}</th><th>${t('party')}</th>
    <th style="text-align:right">${t('taxable')}</th><th style="text-align:right">${t('cgst')}</th><th style="text-align:right">${t('sgst')}</th>
    <th style="text-align:right">${t('total')}</th><th>${t('status')}</th><th>${t('actions')}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
}
function newPurchase(){
  purchLines=[{itemId:'',itemName:'',qty:1,rate:0,disc:0,gstRate:5,amount:0,gstAmt:0,total:0}];
  const parties=load('parties',[]).filter(p=>p.type==='vendor'||p.type==='both');
  openModal('New Purchase Bill',purchModal(nextInvNo('PI-',load('purchases',[]),'billNo'),parties),
    `<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="savePurch()">${t('save')}</button>`);
  calcPurchTotals();
}
function purchModal(billNo,parties,p={}){
  const pOpts=parties.map(x=>`<option value="${x.id}" ${p.partyId===x.id?'selected':''}>${x.name}</option>`).join('');
  return `<div class="form-grid form-grid-3" style="margin-bottom:10px">
    <div class="form-group"><label>${t('bill_no')}</label><input id="p-billno" value="${billNo}"/></div>
    <div class="form-group"><label>${t('date')}</label><input id="p-date" type="date" value="${p.date||today()}"/></div>
    <div class="form-group"><label>${t('party')}</label><select id="p-party"><option value="">-- Select --</option>${pOpts}</select></div>
  </div>
  <div style="font-size:9px;display:grid;grid-template-columns:2fr 70px 95px 70px 85px 30px;gap:6px;color:var(--text3);text-transform:uppercase;padding:0 0 3px;font-family:var(--mono)">
    <span>${t('item')}</span><span>${t('qty')}</span><span>${t('rate')}</span><span>${t('disc')}%</span><span>GST%</span><span></span>
  </div>
  <div id="purch-lines">${purchLines.map((l,i)=>purchLineHTML(l,i)).join('')}</div>
  <button class="btn btn-sm" style="margin:7px 0" onclick="addPurchLine()">+ Add Line</button>
  <div id="purch-totals" class="invoice-total"></div>
  <div class="form-group" style="margin-top:10px"><label>${t('status')}</label><select id="p-status">
    <option value="paid">${t('paid')}</option><option value="unpaid">${t('unpaid')}</option>
  </select></div>`;
}
function purchLineHTML(l,i){
  const items=load('items',[]);
  const iOpts=items.map(x=>`<option value="${x.id}" data-rate="${x.rate}" data-gst="${x.gstRate}" ${l.itemId===x.id?'selected':''}>${x.name}</option>`).join('');
  return `<div class="invoice-line" id="pl-${i}">
    <select onchange="updatePurchLine(${i},this)" style="width:100%"><option value="">-- Select --</option>${iOpts}</select>
    <input type="number" value="${l.qty}" min="0.01" step="0.01" oninput="purchLines[${i}].qty=+this.value;calcPurchTotals()" style="width:100%"/>
    <input type="number" value="${l.rate}" step="0.01" oninput="purchLines[${i}].rate=+this.value;calcPurchTotals()" style="width:100%"/>
    <input type="number" value="${l.disc||0}" oninput="purchLines[${i}].disc=+this.value;calcPurchTotals()" style="width:100%"/>
    <select onchange="purchLines[${i}].gstRate=+this.value;calcPurchTotals()" style="width:100%">
      ${[0,3,5,12,18,28].map(r=>`<option value="${r}" ${l.gstRate===r?'selected':''}>${r}%</option>`).join('')}
    </select>
    <button class="btn btn-sm btn-danger" onclick="purchLines.splice(${i},1);document.getElementById('purch-lines').innerHTML=purchLines.map((l,j)=>purchLineHTML(l,j)).join('');calcPurchTotals()" style="padding:3px 5px">✕</button>
  </div>`;
}
function updatePurchLine(i,sel){
  const opt=sel.selectedOptions[0];
  purchLines[i].itemId=sel.value;purchLines[i].itemName=opt.textContent;
  purchLines[i].rate=parseFloat(opt.dataset.rate)||0;purchLines[i].gstRate=parseFloat(opt.dataset.gst)||0;
  calcPurchTotals();document.getElementById('purch-lines').innerHTML=purchLines.map((l,j)=>purchLineHTML(l,j)).join('');
}
function addPurchLine(){purchLines.push({itemId:'',itemName:'',qty:1,rate:0,disc:0,gstRate:5});document.getElementById('purch-lines').innerHTML=purchLines.map((l,i)=>purchLineHTML(l,i)).join('');calcPurchTotals();}
function calcPurchTotals(){
  let sub=0,disc=0,taxable=0,cgst=0,sgst=0;
  purchLines.forEach(l=>{const amt=l.qty*l.rate;const d=amt*l.disc/100;const tax=amt-d;const g=tax*l.gstRate/100;sub+=amt;disc+=d;taxable+=tax;cgst+=g/2;sgst+=g/2;});
  const el=document.getElementById('purch-totals');
  if(el)el.innerHTML=`
    <div class="stat-row"><span>${t('amount')}</span><span>${fmt(sub)}</span></div>
    <div class="stat-row"><span>Discount</span><span>- ${fmt(disc)}</span></div>
    <div class="stat-row"><span>${t('taxable')}</span><span>${fmt(taxable)}</span></div>
    <div class="stat-row"><span class="cgst">CGST</span><span class="cgst">${fmt(cgst)}</span></div>
    <div class="stat-row"><span class="sgst">SGST</span><span class="sgst">${fmt(sgst)}</span></div>
    <div class="stat-row"><span style="font-size:13px">${t('total')}</span><span style="font-size:15px;font-weight:700">${fmt(taxable+cgst+sgst)}</span></div>`;
}
function savePurch(){
  const partyEl=document.getElementById('p-party');
  if(!partyEl.value||purchLines.length===0){alert('Select party and at least one item');return;}
  const purchases=load('purchases',[]);
  let sub=0,disc=0,taxable=0,cgst=0,sgst=0;
  purchLines.forEach(l=>{const amt=l.qty*l.rate;const d=amt*l.disc/100;const tax=amt-d;const g=tax*l.gstRate/100;sub+=amt;disc+=d;taxable+=tax;cgst+=g/2;sgst+=g/2;});
  const rec={id:uid(),billNo:document.getElementById('p-billno').value,date:document.getElementById('p-date').value,partyId:partyEl.value,partyName:partyEl.selectedOptions[0]?.textContent||'',lines:purchLines,subTotal:sub,discAmt:disc,taxable,cgst,sgst,igst:0,totalGst:cgst+sgst,grandTotal:taxable+cgst+sgst,status:document.getElementById('p-status').value};
  purchases.push(rec);
  const items=load('items',[]);
  purchLines.forEach(l=>{const idx=items.findIndex(x=>x.id===l.itemId);if(idx>=0)items[idx].currentQty+=l.qty;});
  save('items',items);save('purchases',purchases);addAudit('Purchase','Add',`Bill: ${rec.billNo} | ${rec.partyName} | ${fmt(rec.grandTotal)}`);closeModal();renderPurchase();
}
function delPurch(id){if(!confirm(t('confirm_del')))return;save('purchases',load('purchases',[]).filter(p=>p.id!==id));addAudit('Purchase','Delete',`ID: ${id}`);renderPurchase();}

// ═══════════════════════════════════
//  ACCOUNTS / LEDGER
// ═══════════════════════════════════
function renderAccounts(){
  const accounts=load('accounts',[]);
  const rows=accounts.map(a=>`<tr>
    <td>${a.name}</td><td>${a.group||'-'}</td><td>${a.type}</td>
    <td class="td-num">${fmt(a.opening||0)}</td>
    <td><button class="btn btn-sm" onclick="showLedger('${a.id}')">${t('ledger')}</button>
        <button class="btn btn-sm" onclick="editAccount('${a.id}')">${t('edit')}</button>
        <button class="btn btn-sm btn-danger" onclick="delAccount('${a.id}')">${t('del')}</button></td>
  </tr>`).join('');
  document.getElementById('content').innerHTML=`
  <div class="section-header"><h3>${t('menu_accounts')}</h3>
    <button class="btn btn-primary" onclick="newAccount()">+ Add Account</button>
  </div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table>
    <thead><tr><th>${t('name')}</th><th>Group</th><th>${t('type')}</th><th style="text-align:right">${t('opening')}</th><th>${t('actions')}</th></tr></thead>
    <tbody>${rows||`<tr><td colspan="5" style="text-align:center;color:var(--text3)">No accounts</td></tr>`}</tbody>
  </table></div></div>`;
}
function accountForm(a={}){
  return `<div class="form-grid form-grid-2">
    <div class="form-group"><label>${t('name')} *</label><input id="a-name" value="${a.name||''}"/></div>
    <div class="form-group"><label>Group</label><select id="a-group">
      ${['Cash & Bank','Income','Expense','Current Assets','Current Liabilities','Fixed Assets','Capital','Loans','Liabilities'].map(g=>`<option ${a.group===g?'selected':''}>${g}</option>`).join('')}
    </select></div>
    <div class="form-group"><label>${t('type')}</label><select id="a-type">
      ${['Asset','Liability','Income','Expense','Capital'].map(tp=>`<option ${a.type===tp?'selected':''}>${tp}</option>`).join('')}
    </select></div>
    <div class="form-group"><label>${t('opening')}</label><input id="a-opening" type="number" value="${a.opening||0}"/></div>
  </div>`;
}
function newAccount(){openModal('New Account',accountForm(),`<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveAccount()">${t('save')}</button>`);}
function editAccount(id){const a=load('accounts',[]).find(x=>x.id===id);openModal('Edit Account',accountForm(a),`<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveAccount('${id}')">${t('save')}</button>`);}
function saveAccount(id=null){
  const name=document.getElementById('a-name').value.trim();if(!name)return;
  const accounts=load('accounts',[]);
  const rec={id:id||uid(),name,group:document.getElementById('a-group').value,type:document.getElementById('a-type').value,opening:parseFloat(document.getElementById('a-opening').value)||0};
  if(id){const i=accounts.findIndex(x=>x.id===id);accounts[i]=rec;}else{accounts.push(rec);}
  save('accounts',accounts);addAudit('Accounts',id?'Edit':'Add',`Account: ${name}`);closeModal();renderAccounts();
}
function delAccount(id){if(!confirm(t('confirm_del')))return;save('accounts',load('accounts',[]).filter(a=>a.id!==id));addAudit('Accounts','Delete',`ID: ${id}`);renderAccounts();}
function showLedger(id){
  const a=load('accounts',[]).find(x=>x.id===id);
  const journals=load('journals',[]).filter(j=>j.entries.some(e=>e.accountId===id));
  const rows=journals.map(j=>{
    const e=j.entries.find(e=>e.accountId===id);
    return `<tr><td>${j.date}</td><td>${j.ref||'-'}</td><td>${j.narration||'-'}</td>
      <td class="td-num">${e.type==='dr'?fmt(e.amount):'-'}</td>
      <td class="td-num">${e.type==='cr'?fmt(e.amount):'-'}</td></tr>`;}).join('');
  openModal(`${t('ledger')}: ${a.name}`,`
    <div style="margin-bottom:10px"><span class="badge badge-blue">${t('opening')}: ${fmt(a.opening||0)}</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>${t('date')}</th><th>Ref</th><th>${t('narration')}</th><th style="text-align:right">${t('dr')}</th><th style="text-align:right">${t('cr')}</th></tr></thead>
      <tbody>${rows||`<tr><td colspan="5" style="text-align:center;color:var(--text3)">${t('no_data')}</td></tr>`}</tbody>
    </table></div>`);
}

//  JOURNAL ENTRY
// ═══════════════════════════════════
let jEntries=[];
function renderJournal(){
  const journals=load('journals',[]);
  const rows=journals.slice().reverse().map(j=>`<tr>
    <td>${j.date}</td><td>${j.ref||'-'}</td><td>${j.narration}</td>
    <td class="td-num">${fmt(j.entries.filter(e=>e.type==='dr').reduce((a,e)=>a+e.amount,0))}</td>
    <td><button class="btn btn-sm btn-danger" onclick="delJournal('${j.id}')">${t('del')}</button></td>
  </tr>`).join('');
  document.getElementById('content').innerHTML=`
  <div class="section-header"><h3>${t('menu_journal')}</h3>
    <button class="btn btn-primary" onclick="newJournal()">+ New Entry</button>
  </div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table>
    <thead><tr><th>${t('date')}</th><th>Ref</th><th>${t('narration')}</th><th style="text-align:right">${t('amount')}</th><th>${t('actions')}</th></tr></thead>
    <tbody>${rows||`<tr><td colspan="5" style="text-align:center;color:var(--text3)">${t('no_data')}</td></tr>`}</tbody>
  </table></div></div>`;
}
function newJournal(){
  jEntries=[{accountId:'',type:'dr',amount:0},{accountId:'',type:'cr',amount:0}];
  openModal('New Journal Entry',journalModal(),`<button class="btn" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="saveJournal()">${t('save')}</button>`);
}
function journalModal(){
  const accounts=load('accounts',[]);
  const aOpts=accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  return `<div class="form-grid form-grid-2" style="margin-bottom:10px">
    <div class="form-group"><label>${t('date')}</label><input id="j-date" type="date" value="${today()}"/></div>
    <div class="form-group"><label>Reference</label><input id="j-ref" placeholder="JV-001"/></div>
    <div class="form-group" style="grid-column:span 2"><label>${t('narration')}</label><input id="j-narration" placeholder="Narration..."/></div>
  </div>
  <div style="font-size:9px;display:grid;grid-template-columns:2fr 80px 120px 30px;gap:8px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;font-family:var(--mono)">
    <span>Account</span><span>Dr/Cr</span><span>Amount</span><span></span>
  </div>
  <div id="j-lines">${journalLines(aOpts)}</div>
  <button class="btn btn-sm" style="margin-top:8px" onclick="jEntries.push({accountId:'',type:'dr',amount:0});document.getElementById('j-lines').innerHTML=journalLines(document.querySelectorAll('#j-lines select')[0]?.innerHTML||'')">+ Add Line</button>`;
}
function journalLines(aOpts){
  if(!aOpts){const accounts=load('accounts',[]);aOpts=accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');}
  return jEntries.map((e,i)=>`<div style="display:grid;grid-template-columns:2fr 80px 120px 30px;gap:8px;margin-bottom:5px">
    <select onchange="jEntries[${i}].accountId=this.value" style="width:100%"><option value="">-- Account --</option>${aOpts}</select>
    <select onchange="jEntries[${i}].type=this.value" style="width:100%">
      <option value="dr" ${e.type==='dr'?'selected':''}>Dr</option>
      <option value="cr" ${e.type==='cr'?'selected':''}>Cr</option>
    </select>
    <input type="number" value="${e.amount}" oninput="jEntries[${i}].amount=+this.value" style="width:100%"/>
    <button class="btn btn-sm btn-danger" onclick="jEntries.splice(${i},1);document.getElementById('j-lines').innerHTML=journalLines()" style="padding:3px 5px">✕</button>
  </div>`).join('');
}
function saveJournal(){
  const narr=document.getElementById('j-narration').value.trim();
  const dr=jEntries.filter(e=>e.type==='dr').reduce((a,e)=>a+e.amount,0);
  const cr=jEntries.filter(e=>e.type==='cr').reduce((a,e)=>a+e.amount,0);
  if(Math.abs(dr-cr)>0.01){alert('Debit and Credit must be equal. Dr='+fmtNum(dr)+' Cr='+fmtNum(cr));return;}
  if(!narr){alert('Narration required');return;}
  const journals=load('journals',[]);
  const rec={id:uid(),date:document.getElementById('j-date').value,ref:document.getElementById('j-ref').value,narration:narr,entries:jEntries};
  journals.push(rec);save('journals',journals);
  addAudit('Journal','Add',`${narr} | Dr/Cr: ${fmt(dr)}`);closeModal();renderJournal();
}
function delJournal(id){if(!confirm(t('confirm_del')))return;save('journals',load('journals',[]).filter(j=>j.id!==id));addAudit('Journal','Delete',`ID: ${id}`);renderJournal();}
</script>
<script>
// ═══════════════════════════════════
//  REPORTS (with print header/logo)
// ═══════════════════════════════════
function renderReports(){
  document.getElementById('content').innerHTML=`
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tb')" id="tab-tb">${t('trial_balance')}</div>
    <div class="tab" onclick="switchTab('pl')" id="tab-pl">${t('pl_account')}</div>
    <div class="tab" onclick="switchTab('bs')" id="tab-bs">${t('balance_sheet')}</div>
  </div>
  <div id="tab-content-tb" class="tab-content active">${trialBalanceHTML()}</div>
  <div id="tab-content-pl" class="tab-content">${plHTML()}</div>
  <div id="tab-content-bs" class="tab-content">${bsHTML()}</div>`;
}
function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('tab-content-'+id).classList.add('active');
}
function trialBalanceHTML(){
  const accounts=load('accounts',[]);
  const sales=load('sales',[]);const purchases=load('purchases',[]);
  const totalSales=sales.reduce((a,s)=>a+s.grandTotal,0);
  const totalPurch=purchases.reduce((a,p)=>a+p.grandTotal,0);
  const rows=accounts.map(a=>{
    const dr=a.type==='Expense'||a.type==='Asset'?a.opening:0;
    const cr=a.type==='Income'||a.type==='Liability'||a.type==='Capital'?a.opening:0;
    return `<tr><td>${a.name}</td><td>${a.group}</td>
      <td class="td-num">${dr>0?fmt(dr):'-'}</td>
      <td class="td-num">${cr>0?fmt(cr):'-'}</td></tr>`;}).join('');
  const totDr=accounts.filter(a=>a.type==='Expense'||a.type==='Asset').reduce((s,a)=>s+a.opening,0)+totalPurch;
  const totCr=accounts.filter(a=>a.type==='Income'||a.type==='Liability'||a.type==='Capital').reduce((s,a)=>s+a.opening,0)+totalSales;
  return `<div class="section-header"><h3>${t('trial_balance')}</h3>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="exportTableCSV('tb-table','Trial_Balance')">${t('export_csv')}</button>
      <button class="btn" onclick="window.print()">🖨 Print</button>
    </div>
  </div>
  <div style="display:none" id="print-header-tb">${printHeaderHTML()}</div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table id="tb-table">
    <thead><tr><th>Account</th><th>Group</th><th style="text-align:right">${t('dr')}</th><th style="text-align:right">${t('cr')}</th></tr></thead>
    <tbody>${rows}
      <tr><td>Sales (all invoices)</td><td>Income</td><td class="td-num">-</td><td class="td-num">${fmt(totalSales)}</td></tr>
      <tr><td>Purchases (all bills)</td><td>Expense</td><td class="td-num">${fmt(totalPurch)}</td><td class="td-num">-</td></tr>
    </tbody>
    <tfoot><tr style="font-weight:700;background:var(--surface2)"><td colspan="2">Total</td>
      <td class="td-num">${fmt(totDr+totalPurch)}</td><td class="td-num">${fmt(totCr+totalSales)}</td>
    </tr></tfoot>
  </table></div></div>`;
}
function plHTML(){
  const sales=load('sales',[]);const purchases=load('purchases',[]);
  const totalSales=sales.reduce((a,s)=>a+s.taxable,0);
  const totalPurch=purchases.reduce((a,p)=>a+p.taxable,0);
  const grossProfit=totalSales-totalPurch;
  const expAccounts=load('accounts',[]).filter(a=>a.type==='Expense');
  const totalExp=expAccounts.reduce((a,e)=>a+e.opening,0);
  const netProfit=grossProfit-totalExp;
  return `<div class="section-header"><h3>${t('pl_account')}</h3>
    <button class="btn" onclick="window.print()">🖨 Print</button></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="card"><div class="card-title">Income</div>
      <div class="stat-row"><span>Sales (Net of Discount)</span><span>${fmt(totalSales)}</span></div>
      <div class="stat-row" style="font-weight:700"><span>Total Income</span><span>${fmt(totalSales)}</span></div>
    </div>
    <div class="card"><div class="card-title">Expenditure</div>
      <div class="stat-row"><span>Cost of Goods Sold</span><span>${fmt(totalPurch)}</span></div>
      ${expAccounts.map(e=>`<div class="stat-row"><span>${e.name}</span><span>${fmt(e.opening)}</span></div>`).join('')}
      <div class="stat-row" style="font-weight:700"><span>Total Expenses</span><span>${fmt(totalPurch+totalExp)}</span></div>
    </div>
  </div>
  <div class="card" style="text-align:center;padding:20px">
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-family:var(--mono)">${netProfit>=0?'NET PROFIT':'NET LOSS'}</div>
    <div style="font-size:28px;font-weight:700;color:${netProfit>=0?'var(--success)':'var(--danger)'};">${fmt(Math.abs(netProfit))}</div>
  </div>`;
}
function bsHTML(){
  const accounts=load('accounts',[]);
  const assets=accounts.filter(a=>a.type==='Asset');
  const liabilities=accounts.filter(a=>a.type==='Liability'||a.type==='Capital');
  const totalAssets=assets.reduce((s,a)=>s+a.opening,0);
  const totalLiab=liabilities.reduce((s,a)=>s+a.opening,0);
  return `<div class="section-header"><h3>${t('balance_sheet')}</h3>
    <button class="btn" onclick="window.print()">🖨 Print</button></div>

function exportData(key){
  const data=load(key,[]);
  if(!data.length){alert('No data to export');return;}
  const headers=Object.keys(data[0]).filter(k=>k!=='lines'&&k!=='entries');
  const csv=[headers.join(','),...data.map(row=>headers.map(h=>{const v=row[h];if(typeof v==='string'&&(v.includes(',')||v.includes('"')))return '"'+v.replace(/"/g,'""')+'"';return v??'';}).join(','))].join('\n');
  downloadFile(csv,`bizflow_${key}_${today()}.csv`,'text/csv');
  addAudit('Import/Export','Export',`Exported ${key} — ${data.length} records`);
}
function importCSV(event,key){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    if(lines.length<2){alert('Empty CSV');return;}
    const headers=lines[0].split(',');
    const records=lines.slice(1).map(line=>{
      const vals=line.split(',');const obj={};
      headers.forEach((h,i)=>{obj[h.trim()]=vals[i]?.trim()||'';});
      if(!obj.id)obj.id=uid();return obj;
    });
    const existing=load(key,[]);
    save(key,[...existing,...records]);
    addAudit('Import/Export','Import',`Imported ${records.length} records → ${key}`);
    showToast(`Imported ${records.length} records into ${key}!`,'success');
  };
  reader.readAsText(file);
}
function exportTableCSV(tableId,filename){
  const table=document.getElementById(tableId);
  if(!table){showToast('Table not found','danger');return;}
  const rows=Array.from(table.querySelectorAll('tr')).map(tr=>
    Array.from(tr.querySelectorAll('th,td')).map(td=>'"'+td.innerText.replace(/"/g,'""')+'"').join(',')
  ).join('\n');
  downloadFile(rows,`bizflow_${filename}_${today()}.csv`,'text/csv');
}
function downloadFile(content,filename,mime){
  const blob=new Blob([content],{type:mime});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
