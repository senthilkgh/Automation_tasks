// ═══════════════════════════════════
//  BACKUP FUNCTIONS
// ═══════════════════════════════════
async function generateChecksum(data){
  // Simple checksum using character codes (no crypto API needed)
  let hash=0;const str=JSON.stringify(data);
  for(let i=0;i<str.length;i++){const c=str.charCodeAt(i);hash=((hash<<5)-hash)+c;hash|=0;}
  return hash.toString(16);
}

async function createBackup(format='bfbak'){
  const allKeys=['settings','parties','items','sales','purchases','accounts','journals','auditlog','permissions'];
  const backup={
    _meta:{version:'3.0',app:'BizFlow ERP',created:new Date().toISOString(),format},
    _tables:allKeys
  };
  allKeys.forEach(k=>{backup[k]=load(k,k==='settings'?{}:[]);});
  // Add logo separately
  const logoData=localStorage.getItem('erp_logoData')||'';
  backup._logo=logoData;
  const checksum=await generateChecksum(backup);
  backup._checksum=checksum;
  const company=(backup.settings?.company||'bizflow').replace(/[^a-z0-9]/gi,'_').toLowerCase();
  if(format==='json'){
    downloadFile(JSON.stringify(backup,null,2),`bizflow_export_${company}_${today()}.json`,'application/json');
  } else if(format==='csv_all'){
    // Export each table as separate download
    allKeys.filter(k=>Array.isArray(backup[k])&&backup[k].length>0).forEach(k=>{
      const data=backup[k];
      const headers=Object.keys(data[0]).filter(h=>h!=='lines'&&h!=='entries');
      const csv=[headers.join(','),...data.map(row=>headers.map(h=>{const v=row[h];if(typeof v==='string'&&(v.includes(',')||v.includes('"')))return '"'+v.replace(/"/g,'""')+'"';return v??'';}).join(','))].join('\n');
      downloadFile(csv,`bizflow_${k}_${today()}.csv`,'text/csv');
    });
    showToast('All tables exported as CSV!','success');
    return;
  } else {
    downloadFile(JSON.stringify(backup),`bizflow_backup_${company}_${today()}.bfbak`,'application/octet-stream');
  }
  localStorage.setItem('erp_lastBackup',new Date().toLocaleString());
  addAudit('Backup','Export',`Backup created (${format}) — ${company}`);
  showToast('Backup downloaded successfully!','success');
  // Refresh the page to update last backup display
  setTimeout(()=>renderBackup(),500);
}

async function restoreBackup(event){
  const file=event.target.files[0];if(!file)return;
  const statusEl=document.getElementById('restore-status');
  statusEl.innerHTML='<div class="alert alert-info">Reading backup file...</div>';
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const backup=JSON.parse(e.target.result);
      // Verify checksum if present
      if(backup._checksum){
        const storedCheck=backup._checksum;
        delete backup._checksum;
        const calcCheck=await generateChecksum(backup);
        backup._checksum=storedCheck;
        if(storedCheck!==calcCheck){
          statusEl.innerHTML='<div class="alert alert-warn">⚠ Checksum mismatch — file may be modified. Proceeding anyway...</div>';
        } else {
          statusEl.innerHTML='<div class="alert alert-success">✓ Checksum verified — file integrity OK</div>';
        }
      }
      if(!confirm('This will overwrite ALL current data. Are you sure?')){statusEl.innerHTML='';return;}
      const allKeys=['settings','parties','items','sales','purchases','accounts','journals','auditlog','permissions'];
      allKeys.forEach(k=>{if(backup[k]!==undefined)save(k,backup[k]);});
      if(backup._logo)localStorage.setItem('erp_logoData',backup._logo);
      localStorage.setItem('erp_lastBackup',new Date().toLocaleString());
      addAudit('Backup','Restore','Full backup restored from file');
      statusEl.innerHTML='<div class="alert alert-success">✓ Backup restored successfully! Reloading...</div>';
      setTimeout(()=>location.reload(),1500);
    }catch(err){
      statusEl.innerHTML=`<div class="alert alert-danger">✕ Restore failed: ${err.message}<br/><small>Try using the selective restore or check the file format.</small></div>`;
    }
  };
  reader.readAsText(file);
}

async function prepareSelectiveRestore(event){
  const file=event.target.files[0];if(!file)return;
  const optEl=document.getElementById('selective-options');
  optEl.innerHTML='<div style="color:var(--text3);font-size:11px">Reading file...</div>';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const backup=JSON.parse(e.target.result);
      const availKeys=['parties','items','sales','purchases','accounts','journals','settings'].filter(k=>backup[k]);
      optEl.innerHTML=`
        <div style="margin-bottom:8px;font-size:11px;color:var(--text3)">Select tables to restore:</div>
        ${availKeys.map(k=>`
          <label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;font-size:12px">
            <input type="checkbox" id="sel-${k}" checked style="width:auto"/>
            <span style="font-family:var(--mono)">${k}</span>
            <span style="color:var(--text3);font-size:10px">(${Array.isArray(backup[k])?backup[k].length+' records':'1 record'})</span>
          </label>`).join('')}
        <button class="btn btn-warn" style="margin-top:8px;width:100%" onclick="doSelectiveRestore(${JSON.stringify(backup).replace(/</g,'\\u003c')})">Restore Selected</button>`;
    }catch(err){optEl.innerHTML=`<div class="alert alert-danger">Invalid file: ${err.message}</div>`;}
  };
  reader.readAsText(file);
}

function doSelectiveRestore(backup){
  const allKeys=['parties','items','sales','purchases','accounts','journals','settings'];
  const toRestore=allKeys.filter(k=>{const el=document.getElementById('sel-'+k);return el&&el.checked;});
  if(!toRestore.length){showToast('Select at least one table','warn');return;}
  if(!confirm(`Restore: ${toRestore.join(', ')}? This will overwrite those tables.`))return;
  toRestore.forEach(k=>{if(backup[k]!==undefined)save(k,backup[k]);});
  addAudit('Backup','Selective Restore',`Tables: ${toRestore.join(', ')}`);
  showToast(`Restored: ${toRestore.join(', ')}!`,'success');
  document.getElementById('selective-options').innerHTML='<div class="alert alert-success">✓ Selected tables restored!</div>';
}

function toggleAutoBackup(enabled){
  localStorage.setItem('erp_autoBackup',String(enabled));
  showToast(enabled?'Auto-backup enabled — backup will be created on each app start':'Auto-backup disabled','info');
}

function clearAuditLog(){
  if(!confirm('Clear all audit log entries?'))return;
  save('auditlog',[]);addAudit('Backup','ClearLog','Audit log cleared');showToast('Audit log cleared','success');
}

function resetAllData(){
  if(!confirm('WARNING: This will delete ALL data permanently.'))return;
  const inp=prompt('Type RESET to confirm:');if(inp!=='RESET')return;
  ['settings','parties','items','sales','purchases','accounts','journals','auditlog','seeded','permissions','lastBackup','autoBackup'].forEach(k=>localStorage.removeItem('erp_'+k));
  localStorage.removeItem('erp_logoData');
  alert('All data cleared. Reloading...');location.reload();
}
</script>
<script>
// ═══════════════════════════════════
//  SETTINGS (with logo + permissions)
// ═══════════════════════════════════
function renderSettings(){
  const s=DB.settings;
  const logoData=s.logoData||localStorage.getItem('erp_logoData')||'';
  const perms=DB.permissions;

  const permCards=Object.entries(perms).map(([key,perm])=>{
    const moduleMap={
      accounts:['Accounts','Journal Entry','Reports','Trial Balance','P&L','Balance Sheet'],
      sales:['Sales Register','New Invoice','Receivables'],
      purchase:['Purchase Register','New Bill','Payables'],
      parties:['Customer & Vendor Master'],
      inventory:['Stock Items','Stock Register','Low Stock Alert'],
      gst:['GSTR-1','GSTR-3B','HSN Summary','ITC Tracking'],
      importexport:['Import CSV','Export CSV','Data Backup'],
      audit:['Audit Trail','Change Log','User Activity']
    };
    const mods=moduleMap[key]||[];
    return `<div class="perm-card ${perm.enabled?'enabled':''}" id="perm-card-${key}">
      <div class="perm-header">
        <div>
          <div class="perm-title">${perm.label}</div>
          <div class="perm-desc">${perm.desc}</div>
        </div>
        <label class="toggle">
          <input type="checkbox" ${perm.enabled?'checked':''} onchange="togglePerm('${key}',this.checked)"/>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="perm-modules">
        ${mods.map(m=>`<span class="badge ${perm.enabled?'badge-blue':'badge-gray'}">${m}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
  <div class="tabs">
    <div class="tab active" onclick="switchTab('set-company')" id="tab-set-company">Company & Logo</div>
    <div class="tab" onclick="switchTab('set-perms')" id="tab-set-perms">Module Permissions</div>
    <div class="tab" onclick="switchTab('set-advanced')" id="tab-set-advanced">Advanced</div>
  </div>

  <div id="tab-content-set-company" class="tab-content active">
    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:14px">
      <!-- LOGO -->
      <div class="card">
        <div class="card-title">Company Logo</div>
        <div style="text-align:center;margin-bottom:14px">
          ${logoData?`<img src="${logoData}" style="width:100px;height:100px;object-fit:contain;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);margin-bottom:10px" id="logo-preview-big"/>`
          :`<div style="width:100px;height:100px;background:var(--surface2);border:2px dashed var(--border2);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:32px;color:var(--text3)" id="logo-preview-big">◆</div>`}
        </div>
        <div class="logo-upload-area" onclick="document.getElementById('logo-file').click()">
          <input type="file" id="logo-file" accept="image/*" style="display:none" onchange="handleLogoUpload(event)"/>
          <div style="font-size:22px;margin-bottom:6px">📷</div>
          <div style="font-size:12px;color:var(--text2)">Click to upload logo</div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">PNG, JPG, SVG — max 2MB</div>
          <div style="font-size:10px;color:var(--text3)">Recommended: 200×200px square</div>
        </div>
        ${logoData?`<button class="btn btn-danger btn-sm" style="width:100%;margin-top:8px" onclick="removeLogo()">Remove Logo</button>`:''}
        <div class="alert alert-info" style="margin-top:10px;font-size:11px">Logo appears on all invoices, bills, and print reports.</div>
      </div>
      <!-- COMPANY INFO -->
      <div class="card">
        <div class="card-title">Company Information</div>
        <div class="form-grid" style="gap:10px">
          <div class="form-group"><label>${t('settings_company')}</label><input id="set-company" value="${s.company||''}"/></div>
          <div class="form-group"><label>${t('settings_gstin')}</label><input id="set-gstin" value="${s.gstin||''}" placeholder="22AAAAA0000A1Z5"/></div>
          <div class="form-group"><label>${t('settings_address')}</label><textarea id="set-address">${s.address||''}</textarea></div>
          <div class="form-group"><label>${t('settings_fy')}</label>
            <select id="set-fy">${['2022-23','2023-24','2024-25','2025-26'].map(y=>`<option ${s.fy===y?'selected':''}>${y}</option>`).join('')}</select></div>
          <div class="form-group"><label>${t('settings_currency')}</label>
            <select id="set-currency">${[['₹','INR — Indian Rupee'],['$','USD — US Dollar'],['€','EUR — Euro'],['£','GBP — British Pound'],['¥','JPY — Japanese Yen'],['AED','AED — UAE Dirham']].map(([sym,lbl])=>`<option value="${sym}" ${s.currency===sym?'selected':''}>${lbl}</option>`).join('')}</select></div>
        </div>
        <button class="btn btn-primary" style="margin-top:14px;width:100%" onclick="saveSettings()">${t('settings_save')}</button>
        <div id="settings-msg" style="margin-top:6px;font-size:11px;color:var(--success)"></div>
      </div>
    </div>
  </div>

  <div id="tab-content-set-perms" class="tab-content">
    <div class="alert alert-info" style="margin-bottom:14px">
      Enable or disable modules based on your business needs. Disabled modules are hidden from navigation but data is preserved. You can re-enable anytime.
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${permCards}
    </div>
    <div class="alert alert-success" style="margin-top:10px">Changes take effect immediately. Navigation will update to reflect enabled modules.</div>
  </div>

  <div id="tab-content-set-advanced" class="tab-content">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card">
        <div class="card-title">Data Management</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-success" onclick="showModule('backup')">⬇ Go to Backup Center</button>
          <button class="btn" onclick="showModule('importexport')">↑↓ Import / Export</button>
          <button class="btn" onclick="showModule('audit')">🔍 View Audit Log</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">About BizFlow ERP</div>
        <p style="font-size:11.5px;color:var(--text2);line-height:1.8">
          <strong>Version:</strong> 3.0<br/>
          <strong>Storage:</strong> Browser localStorage (JSON)<br/>
          <strong>Modules:</strong> Accounts, Stock, Sales, Purchase, GST, Reports, Backup<br/>
          <strong>Languages:</strong> EN, HI, TA, TE, KN, ML, GU, MR<br/>
          <strong>Works offline:</strong> Yes — no internet required<br/>
          <strong>Backup format:</strong> .bfbak (JSON + checksum)
        </p>
        <div style="margin-top:10px">
          <button class="btn btn-danger" onclick="resetAllData()" style="width:100%">🗑 Factory Reset</button>
        </div>
      </div>
    </div>
  </div>`;
}

function handleLogoUpload(event){
  const file=event.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){showToast('File too large. Max 2MB','danger');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const data=e.target.result;
    // Save logo separately to avoid settings object being too large
    localStorage.setItem('erp_logoData',data);
    // Also embed in settings for backup portability
    const s=DB.settings;s.logoData=data;save('settings',s);
    updateSidebarLogo();
    showToast('Logo uploaded successfully!','success');
    addAudit('Settings','Logo','Company logo updated');
    renderSettings();
  };
  reader.readAsDataURL(file);
}

function removeLogo(){
  if(!confirm('Remove company logo?'))return;
  localStorage.removeItem('erp_logoData');
  const s=DB.settings;delete s.logoData;save('settings',s);
  updateSidebarLogo();
  addAudit('Settings','Logo','Company logo removed');
  renderSettings();
}

function saveSettings(){
  const logoData=localStorage.getItem('erp_logoData')||'';
  const s={
    company:document.getElementById('set-company').value,
    gstin:document.getElementById('set-gstin').value,
    address:document.getElementById('set-address').value,
    fy:document.getElementById('set-fy').value,
    currency:document.getElementById('set-currency').value,
    logoData
  };
  save('settings',s);
  document.getElementById('company-name').textContent=s.company;
  document.getElementById('fy-label').textContent='FY: '+s.fy;
  updateSidebarLogo();
  const msgEl=document.getElementById('settings-msg');
  if(msgEl){msgEl.textContent=t('settings_saved');setTimeout(()=>{if(msgEl)msgEl.textContent='';},3000);}
  addAudit('Settings','Edit','Company settings saved');
  showToast(t('settings_saved'),'success');
}

function togglePerm(key,enabled){
  const perms=DB.permissions;
  perms[key]={...perms[key],enabled};
  save('permissions',perms);
  // Update card style
  const card=document.getElementById('perm-card-'+key);
  if(card){
    card.classList.toggle('enabled',enabled);
    card.querySelectorAll('.badge').forEach(b=>{b.className=`badge ${enabled?'badge-blue':'badge-gray'}`;});
  }
  applyPermissionsToNav();
  addAudit('Settings','Permissions',`${key} module ${enabled?'enabled':'disabled'}`);
  showToast(`${key} module ${enabled?'enabled':'disabled'}${enabled?'':' — data preserved'}`,enabled?'success':'warn');
}

// ═══════════════════════════════════
//  AUTO BACKUP ON START
// ═══════════════════════════════════
function checkAutoBackup(){
  if(localStorage.getItem('erp_autoBackup')==='true'){
    const lastBackup=localStorage.getItem('erp_lastBackup');
    if(!lastBackup||new Date()-new Date(lastBackup)>23*60*60*1000){
      // Auto backup silently
      setTimeout(()=>{
        createBackup('bfbak');
        showToast('Auto-backup created!','success');
      },2000);
    }
  }
}

// ═══════════════════════════════════
//  INIT
// ═══════════════════════════════════
seedIfEmpty();
const _s=DB.settings;
document.getElementById('company-name').textContent=_s.company;
document.getElementById('fy-label').textContent='FY: '+_s.fy;
applyLang();
applyPermissionsToNav();
updateSidebarLogo();
checkAutoBackup();
showModule('dashboard');
</script>
</body>
</html>
