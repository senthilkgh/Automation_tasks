
<style>
.az-wrap {
  background: #003781;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 280px;
  overflow: hidden;
  position: relative;
}
canvas#glitter {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.az-logo {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0px;
}
.az-wordmark {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 52px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 2px;
  line-height: 1;
  animation: fadeUp 1s ease both;
}
.az-eagle-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  animation: fadeUp 1.1s ease both;
}
.az-tagline {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.65);
  letter-spacing: 3.5px;
  text-transform: uppercase;
  margin-top: 10px;
  animation: fadeUp 1.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

<div class="az-wrap" id="wrap">
  <canvas id="glitter"></canvas>
  <div class="az-logo">
    <div class="az-eagle-wrap">
      <svg width="54" height="54" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation:fadeUp 1s ease both;">
        <circle cx="100" cy="100" r="96" stroke="white" stroke-width="7"/>
        <path d="M100 28 C100 28, 58 55, 52 100 C46 145, 80 170, 100 172 C120 170, 154 145, 148 100 C142 55, 100 28, 100 28Z" fill="white" opacity="0.15"/>
        <path d="M100 38 L88 75 L52 75 L80 97 L70 134 L100 112 L130 134 L120 97 L148 75 L112 75 Z" fill="white"/>
        <path d="M100 112 L100 165" stroke="white" stroke-width="6" stroke-linecap="round"/>
        <path d="M78 148 Q100 158 122 148" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
      </svg>
      <div class="az-wordmark">Allianz</div>
    </div>
    <div class="az-tagline">With you. Always.</div>
  </div>
</div>

<script>
const canvas = document.getElementById('glitter');
const wrap   = document.getElementById('wrap');
const ctx    = canvas.getContext('2d');

let W, H, particles = [];

function resize() {
  W = canvas.width  = wrap.offsetWidth;
  H = canvas.height = wrap.offsetHeight;
}

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x    = Math.random() * W;
    this.y    = init ? Math.random() * H : H + 6;
    this.size = Math.random() * 2.4 + 0.4;
    this.speedY = -(Math.random() * 0.4 + 0.15);
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.life   = 0;
    this.maxLife = Math.random() * 180 + 80;
    this.hue  = Math.random() < 0.6
      ? `hsl(${200 + Math.random()*20},80%,${75+Math.random()*20}%)`
      : `hsl(${40  + Math.random()*20},90%,${75+Math.random()*20}%)`;
    this.twinkleSpeed = Math.random() * 0.07 + 0.03;
    this.twinkleOffset = Math.random() * Math.PI * 2;
    this.shape = Math.random() < 0.35 ? 'diamond' : 'circle';
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life++;
    if (this.life > this.maxLife || this.y < -6) this.reset(false);
  }
  draw() {
    const progress = this.life / this.maxLife;
    const fade = progress < 0.15 ? progress / 0.15
               : progress > 0.75 ? 1 - (progress - 0.75) / 0.25 : 1;
    const twinkle = 0.5 + 0.5 * Math.sin(this.life * this.twinkleSpeed + this.twinkleOffset);
    const alpha = fade * twinkle;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.hue;
    if (this.shape === 'diamond') {
      const s = this.size * 1.5;
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(-s/2, -s/2, s, s);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function addStar(x, y) {
  const s = new Particle();
  s.x = x; s.y = y;
  s.size = Math.random() * 3 + 1.5;
  s.life = 0; s.maxLife = 60;
  s.speedY = -(Math.random() * 1.2 + 0.5);
  s.speedX = (Math.random() - 0.5) * 1.2;
  particles.push(s);
}

function init() {
  resize();
  particles = Array.from({length: 120}, () => new Particle());
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  if (Math.random() < 0.18) {
    const p = new Particle();
    p.x = Math.random() * W;
    p.y = Math.random() * H;
    p.life = 0;
    particles.push(p);
    if (particles.length > 200) particles.splice(0, 1);
  }
  requestAnimationFrame(loop);
}

wrap.addEventListener('mousemove', e => {
  const r = wrap.getBoundingClientRect();
  for (let i = 0; i < 3; i++) addStar(e.clientX - r.left, e.clientY - r.top);
  if (particles.length > 260) particles.splice(0, particles.length - 260);
});

window.addEventListener('resize', resize);
init();
loop();
</script>
