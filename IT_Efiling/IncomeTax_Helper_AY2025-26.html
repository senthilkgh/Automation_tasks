<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Indian Income Tax Return Helper — AY 2025-26</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Serif:wght@400;600;700&display=swap');
:root{
  --navy:#0a2540;--navy2:#0d3260;--navy3:#1a4a8a;
  --saffron:#ff9933;--saffron2:#e6870a;--saffron-light:#fff4e6;
  --green:#138808;--green-light:#e8f5e9;
  --white:#ffffff;--off:#f7f8fc;--border:#dde3ef;
  --text:#1a2540;--text2:#4a5568;--text3:#8a96a8;
  --red:#d32f2f;--red-light:#ffeaea;
  --blue:#1565c0;--blue-light:#e3f2fd;
  --shadow:0 2px 16px rgba(10,37,64,.1);
  --radius:10px;--radius2:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--off);color:var(--text);font-family:'Noto Sans',sans-serif;font-size:14px;min-height:100vh}

/* HEADER */
#header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,var(--navy3) 100%);color:#fff;padding:0}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:3px solid var(--saffron)}
.header-brand{display:flex;align-items:center;gap:14px}
.ashoka{font-size:32px;line-height:1}
.brand-text h1{font-family:'Noto Serif',serif;font-size:20px;font-weight:700;letter-spacing:-.3px}
.brand-text p{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
.header-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 14px;font-size:12px;color:rgba(255,255,255,.85)}
.fy-badge{background:var(--saffron);color:var(--navy);font-weight:700;border-radius:20px;padding:4px 14px;font-size:12px}

/* PROGRESS */
#progress-bar{background:var(--navy2);padding:0 32px}
.steps{display:flex;gap:0}
.step{display:flex;align-items:center;gap:8px;padding:12px 20px 12px 0;cursor:pointer;opacity:.5;transition:opacity .2s;font-size:12px;color:#fff;white-space:nowrap}
.step.active{opacity:1}
.step.done{opacity:.75}
.step-num{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.step.active .step-num{background:var(--saffron);border-color:var(--saffron);color:var(--navy)}
.step.done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step-sep{color:rgba(255,255,255,.3);margin-right:20px;font-size:10px}

/* MAIN CONTAINER */
#app{max-width:900px;margin:0 auto;padding:28px 20px 60px}

/* SECTION CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius2);padding:28px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;padding-bottom:16px;border-bottom:2px solid var(--off)}
.card-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.icon-saffron{background:var(--saffron-light)}
.icon-blue{background:var(--blue-light)}
.icon-green{background:var(--green-light)}
.icon-red{background:var(--red-light)}
.card-header-text h2{font-size:16px;font-weight:700;color:var(--navy);font-family:'Noto Serif',serif}
.card-header-text p{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5}

/* FORM ELEMENTS */
.form-grid{display:grid;gap:16px}
.fg2{grid-template-columns:1fr 1fr}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fg4{grid-template-columns:1fr 1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:600;color:var(--text2)}
label .tip{font-weight:400;color:var(--text3);font-size:11px;margin-left:4px}
input[type=text],input[type=number],input[type=email],select{
  border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13.5px;
  font-family:'Noto Sans',sans-serif;color:var(--text);background:#fff;width:100%;
  transition:border .15s,box-shadow .15s}
input:focus,select:focus{outline:none;border-color:var(--navy3);box-shadow:0 0 0 3px rgba(26,74,138,.1)}
input.rupee{padding-left:24px}
.rupee-wrap{position:relative}
.rupee-wrap::before{content:'₹';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.section-sub{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 12px;padding-bottom:6px;border-bottom:1px dashed var(--border)}

/* DEDUCTION ROWS */
.ded-row{display:grid;grid-template-columns:1fr auto 160px;gap:12px;align-items:start;padding:12px 0;border-bottom:1px solid var(--off)}
.ded-row:last-child{border-bottom:none}
.ded-info h4{font-size:13px;font-weight:600;color:var(--text)}
.ded-info p{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.5}
.ded-limit{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-light);padding:2px 8px;border-radius:12px;white-space:nowrap;align-self:start;margin-top:2px}
.ded-applied{font-size:11px;color:var(--green);font-weight:600;margin-top:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans',sans-serif;transition:all .15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy2)}
.btn-saffron{background:var(--saffron);color:var(--navy)}
.btn-saffron:hover{background:var(--saffron2)}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--navy3);color:var(--navy)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{opacity:.9}
.btn-sm{padding:6px 14px;font-size:12px}
.nav-buttons{display:flex;justify-content:space-between;margin-top:24px}

/* REGIME COMPARE */
.regime-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.regime-card{border-radius:var(--radius2);padding:22px;border:2px solid transparent;transition:all .2s;position:relative;overflow:hidden}
.regime-old{background:var(--blue-light);border-color:#90caf9}
.regime-new{background:var(--saffron-light);border-color:#ffcc80}
.regime-best{border-color:var(--green);box-shadow:0 0 0 3px rgba(19,136,8,.15)}
.regime-badge{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
.badge-rec{background:var(--green);color:#fff}
.regime-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;font-family:'Noto Serif',serif}
.regime-tax{font-size:28px;font-weight:700;color:var(--navy);margin:8px 0 4px}
.regime-sub{font-size:11px;color:var(--text3)}
.slab-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.slab-row:last-child{border-bottom:none;font-weight:700;font-size:13px;padding-top:8px}

/* SUMMARY BOX */
.summary-box{background:var(--navy);color:#fff;border-radius:var(--radius2);padding:24px;margin-bottom:16px}
.summary-box h3{font-family:'Noto Serif',serif;font-size:16px;margin-bottom:16px;color:var(--saffron)}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:13px}
.sum-row:last-child{border-bottom:none;font-size:15px;font-weight:700;padding-top:12px;color:var(--saffron)}
.sum-label{color:rgba(255,255,255,.75)}
.sum-val{font-weight:600;font-family:'Noto Sans',monospace}
.sum-val.positive{color:#81c784}
.sum-val.negative{color:#ef9a9a}
.sum-val.highlight{color:var(--saffron)}

/* INFO BOXES */
.info-box{border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.6;margin-bottom:12px;display:flex;gap:10px}
.info-box-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.info-blue{background:var(--blue-light);border-left:3px solid var(--blue)}
.info-green{background:var(--green-light);border-left:3px solid var(--green)}
.info-orange{background:var(--saffron-light);border-left:3px solid var(--saffron)}
.info-red{background:var(--red-light);border-left:3px solid var(--red)}

/* TABS */
.tabs{display:flex;background:var(--off);border-radius:10px;padding:4px;margin-bottom:20px;gap:4px}
.tab{flex:1;padding:9px;text-align:center;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text3);transition:all .15s}
.tab.active{background:#fff;color:var(--navy);box-shadow:var(--shadow)}

/* TABLE */
.comp-table{width:100%;border-collapse:collapse;font-size:13px}
.comp-table th{background:var(--off);padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:2px solid var(--border)}
.comp-table td{padding:10px 12px;border-bottom:1px solid var(--off);vertical-align:top}
.comp-table tr:last-child td{border-bottom:none;font-weight:700;background:rgba(10,37,64,.04)}
.td-right{text-align:right;font-family:'Noto Sans',monospace}
.td-green{color:var(--green);font-weight:600}
.td-red{color:var(--red);font-weight:600}
.td-section{background:var(--off);font-weight:700;font-size:11px;text-transform:uppercase;color:var(--text3)}

/* PROGRESS RING */
.progress-wrap{text-align:center;padding:12px 0}

/* PRINT */
@media print{
  #header .steps,#progress-bar,.nav-buttons,.no-print{display:none!important}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
  body{background:#fff}
}

/* ANIMATIONS */
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.section-anim{animation:slideUp .3s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.calculating{animation:pulse .8s infinite}

/* RESPONSIVE */
@media(max-width:640px){
  .fg2,.fg3,.fg4{grid-template-columns:1fr}
  .regime-grid{grid-template-columns:1fr}
  .header-top{padding:12px 16px}
  #app{padding:16px 12px 40px}
  .steps{overflow-x:auto;padding-bottom:4px}
}

/* TOOLTIP */
.tooltip{position:relative;display:inline-block;cursor:help}
.tooltip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:100;opacity:0;pointer-events:none;transition:opacity .15s;max-width:240px;white-space:normal;line-height:1.4}
.tooltip:hover::after{opacity:1}

/* SPECIAL */
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.tag-80c{background:#e8eaf6;color:#3f51b5}
.tag-80d{background:#fce4ec;color:#c62828}
.tag-other{background:#f3e5f5;color:#6a1b9a}
.tag-hra{background:#e0f2f1;color:#00695c}

.check-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--navy);cursor:pointer}
.check-row label{font-size:13px;cursor:pointer}

.highlight-box{background:linear-gradient(135deg,var(--saffron-light),#fff);border:1px solid #ffcc80;border-radius:12px;padding:16px 20px;margin:16px 0}
.refund-box{background:linear-gradient(135deg,var(--green-light),#fff);border:2px solid var(--green);border-radius:12px;padding:20px;text-align:center}
.due-box{background:linear-gradient(135deg,var(--red-light),#fff);border:2px solid var(--red);border-radius:12px;padding:20px;text-align:center}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-top">
    <div class="header-brand">
      <div class="ashoka">🇮🇳</div>
      <div class="brand-text">
        <h1>Income Tax Return Helper</h1>
        <p>Form 16 Based ITR Computation — Old & New Regime</p>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="header-badge">AY 2025-26</div>
      <div class="fy-badge">FY 2024-25</div>
    </div>
  </div>
  <div id="progress-bar">
    <div class="steps" id="step-nav">
      <div class="step active" onclick="goStep(1)" id="s1"><div class="step-num">1</div><span>Personal Info</span></div>
      <div class="step-sep">›</div>
      <div class="step" onclick="goStep(2)" id="s2"><div class="step-num">2</div><span>Form 16 / Salary</span></div>
      <div class="step-sep">›</div>
      <div class="step" onclick="goStep(3)" id="s3"><div class="step-num">3</div><span>Other Income</span></div>
      <div class="step-sep">›</div>
      <div class="step" onclick="goStep(4)" id="s4"><div class="step-num">4</div><span>Deductions</span></div>
      <div class="step-sep">›</div>
      <div class="step" onclick="goStep(5)" id="s5"><div class="step-num">5</div><span>Tax Computation</span></div>
      <div class="step-sep">›</div>
      <div class="step" onclick="goStep(6)" id="s6"><div class="step-num">6</div><span>Summary & Filing</span></div>
    </div>
  </div>
</div>

<div id="app">
  <div id="step-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  DATA MODEL
// ═══════════════════════════════════════════════════
const ITR = {
  // Step 1
  name:'', pan:'', dob:'', email:'', mobile:'', address:'', assessmentYear:'2025-26', fyYear:'2024-25', itrForm:'ITR-1', resident:'resident',
  // Step 2 - Form 16
  employerName:'', employerTAN:'', employerPAN:'',
  grossSalary:0, basicSalary:0, hra:0, lta:0, specialAllow:0, otherAllow:0,
  professionalTax:0, tdsDeducted:0,
  // Employer provided exemptions
  hraExempt:0, ltaExempt:0, otherExempt:0,
  // HRA calculator
  hraRentPaid:0, hraMetroCity:false, hraCalcManual:false, hraManualAmt:0,
  // Step 3 - Other Income
  savingsInterest:0, fdInterest:0, rdInterest:0,
  rentalIncome:0, rentalMunTax:0,
  stcg111a:0, stcg_other:0, ltcg112a:0, ltcg_other:0,
  dividendIncome:0, otherIncome:0, familyPension:0,
  // Step 4 - Deductions
  // 80C
  lic:0, ppf:0, epf:0, elss:0, nsc:0, scss:0, sukanya:0, tuitionFees:0, hlPrincipal:0, fd5yr:0, stamps:0, nps80ccd1:0,
  // 80CCD(1B)
  nps80ccd1b:0,
  // 80D
  selfMedIns:0, parentMedIns:0, parentSenior:false, selfSenior:false, preventiveHealth:0,
  // 80E
  educLoanInt:0,
  // 80EEA
  hlInterestAddl:0,
  // 80G
  donation80g100:0, donation80g50:0,
  // 80TTA / 80TTB
  savIntDeduction:0,
  // 80U / 80DD
  disability80u:0, disabilityDep80dd:0,
  // Home loan interest (24b)
  hlInterest24b:0, selfOccupied:true,
  // Chapter VIA total will be computed
};

let currentStep = 1;
let computed = {};

function v(id){ return document.getElementById(id)?.value || ''; }
function n(id){ return parseFloat(document.getElementById(id)?.value)||0; }
function cb(id){ return document.getElementById(id)?.checked||false; }
function fmt(x){ return '₹ '+(Math.round(x)||0).toLocaleString('en-IN'); }
function fmtN(x){ return (Math.round(x)||0).toLocaleString('en-IN'); }
function setITR(){ /* collect all fields */ }

// ═══════════════════════════════════════════════════
//  STEP NAVIGATION
// ═══════════════════════════════════════════════════
function goStep(n){
  collectCurrentStep();
  currentStep=n;
  renderStep(n);
  document.querySelectorAll('.step').forEach((el,i)=>{
    el.classList.toggle('active',i*2+1===n*2-1);
    el.classList.toggle('done',i<n-1);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(){ if(validateStep()) goStep(currentStep+1); }
function prev(){ goStep(currentStep-1); }

function validateStep(){
  if(currentStep===1){
    if(!v('pan').match(/^[A-Z]{5}[0-9]{4}[A-Z]$/)){alert('Enter valid PAN (e.g. ABCDE1234F)');return false;}
    if(!v('fullname')){alert('Name is required');return false;}
  }
  return true;
}

function collectCurrentStep(){
  // Collect all visible inputs into ITR object
  const fields=['fullname','pan','dob','email','mobile','address','itrForm','resident',
    'empName','empTAN','empPAN',
    'grossSalary','basicSalary','hraAmt','ltaAmt','specialAllow','otherAllow','profTax','tdsDeducted',
    'hraExemptAmt','hraRentPaid','hraManualAmt',
    'savingsInt','fdInt','rdInt','rentalInc','rentalMunTax',
    'stcg111a','stcgOther','ltcg112a','ltcgOther','dividendInc','otherInc','familyPension',
    'lic','ppf','epf','elss','nsc','scss','sukanya','tuitionFees','hlPrincipal','fd5yr','stamps','nps1','nps1b',
    'selfMed','parentMed','preventive',
    'educLoan','hlInt24b','donation100','donation50','disability80u','disabilityDep'];
  fields.forEach(f=>{
    const el=document.getElementById(f);
    if(el){
      if(el.type==='number'||el.classList.contains('num')) ITR[f]=parseFloat(el.value)||0;
      else if(el.type==='checkbox') ITR[f]=el.checked;
      else ITR[f]=el.value;
    }
  });
}

function renderStep(n){
  const renders=[null,step1,step2,step3,step4,step5,step6];
  document.getElementById('step-content').innerHTML='<div class="section-anim">';
  renders[n]&&renders[n]();
}

// ═══════════════════════════════════════════════════
//  STEP 1: PERSONAL INFO
// ═══════════════════════════════════════════════════
function step1(){
  document.getElementById('step-content').innerHTML=`
  <div class="section-anim">
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-saffron">👤</div>
      <div class="card-header-text">
        <h2>Personal Information</h2>
        <p>Enter your basic details as per PAN card and Aadhaar. This will be used to generate your ITR computation sheet.</p>
      </div>
    </div>
    <div class="form-grid fg2">
      <div class="form-group">
        <label>Full Name (as per PAN) <span style="color:red">*</span></label>
        <input type="text" id="fullname" value="${ITR.fullname||''}" placeholder="RAMESH KUMAR SHARMA" style="text-transform:uppercase"/>
      </div>
      <div class="form-group">
        <label>PAN Number <span style="color:red">*</span></label>
        <input type="text" id="pan" value="${ITR.pan||''}" placeholder="ABCDE1234F" maxlength="10" style="text-transform:uppercase;letter-spacing:2px"/>
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="text" id="dob" value="${ITR.dob||''}" placeholder="DD/MM/YYYY"/>
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="text" id="mobile" value="${ITR.mobile||''}" placeholder="9876543210"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="text" id="email" value="${ITR.email||''}" placeholder="ramesh@email.com"/>
      </div>
      <div class="form-group">
        <label>Residential Status</label>
        <select id="resident">
          <option value="resident" ${ITR.resident==='resident'?'selected':''}>Resident Indian</option>
          <option value="nri" ${ITR.resident==='nri'?'selected':''}>NRI</option>
          <option value="rnor" ${ITR.resident==='rnor'?'selected':''}>RNOR</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:span 2">
        <label>Address</label>
        <input type="text" id="address" value="${ITR.address||''}" placeholder="House No, Street, City, State, PIN"/>
      </div>
    </div>
    <div class="section-sub">Assessment Year</div>
    <div class="form-grid fg3">
      <div class="form-group">
        <label>Assessment Year</label>
        <select id="itrForm">
          <option value="2025-26" selected>AY 2025-26 (FY 2024-25)</option>
        </select>
      </div>
      <div class="form-group">
        <label>ITR Form Type</label>
        <select>
          <option value="ITR-1">ITR-1 (Sahaj) — Salary + 1 House + Other</option>
          <option value="ITR-2">ITR-2 — Multiple Properties / Capital Gains</option>
        </select>
      </div>
      <div class="form-group">
        <label>Age Category</label>
        <select id="agecat" onchange="ITR.agecat=this.value">
          <option value="below60">Below 60 years</option>
          <option value="60to80">Senior Citizen (60–79)</option>
          <option value="above80">Super Senior (80+)</option>
        </select>
      </div>
    </div>
    <div class="info-box info-blue" style="margin-top:16px">
      <div class="info-box-icon">ℹ️</div>
      <div>This tool covers <strong>salaried individuals</strong> filing ITR-1 or ITR-2. It does not cover business income (ITR-3/4). All calculations are based on <strong>FY 2024-25</strong> tax laws including the updated new tax regime slabs.</div>
    </div>
    <div class="nav-buttons">
      <div></div>
      <button class="btn btn-primary" onclick="next()">Next: Form 16 / Salary →</button>
    </div>
  </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  STEP 2: FORM 16 / SALARY
// ═══════════════════════════════════════════════════
function step2(){

function calcHRA(){
  const basic=n('basicSalary')||0;
  const hraRec=n('hraAmt')||0;
  const rentPaid=n('hraRentPaid')||0;
  const metro=document.getElementById('hraMetro')?.value==='1';
  const pct=metro?0.5:0.4;
  const a=hraRec;
  const b=basic*pct;
  const c=Math.max(0,rentPaid-0.1*basic);
  const exempt=Math.min(a,b,c);
  const el=document.getElementById('hraExemptAmt');
  if(el){ el.value=Math.round(exempt); ITR.hraExemptAmt=exempt; }
  const br=document.getElementById('hra-breakdown');
  if(br&&hraRec>0) br.innerHTML=`Min of: HRA Recd ${fmt(a)} | ${metro?'50':'40'}% Basic ${fmt(b)} | Rent-10%Basic ${fmt(c)} → Exempt: ${fmt(exempt)}`;
  liveUpdate();
}

function getSalaryIncome(){
  const gross=n('grossSalary')||0;
  const hraEx=n('hraExemptAmt')||0;
  const ltaEx=n('ltaExempt')||0;
  const othEx=n('otherExempt')||0;
  const profTax=Math.min(n('profTax')||0,2500);
  const totalExempt=hraEx+ltaEx+othEx;
  const netSalary=Math.max(0,gross-totalExempt);
  return {gross,hraEx,ltaEx,othEx,totalExempt,profTax,netSalary};
}

function liveUpdate(){
  const sal=getSalaryIncome();
  const el=document.getElementById('salary-summary-box');
  if(el) el.innerHTML=`
    <div class="highlight-box">
      <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px">SALARY INCOME SUMMARY (Preview)</div>

        <div><div style="font-size:11px;color:var(--text3)">Exemptions u/s 10</div><div style="font-weight:700;color:var(--green)">- ${fmt(sal.totalExempt)}</div></div>
        <div><div style="font-size:11px;color:var(--text3)">Net Salary</div><div style="font-weight:700;color:var(--navy2)">${fmt(sal.netSalary)}</div></div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px">Standard Deduction of ₹75,000 (new regime) / ₹50,000 (old regime) will be applied in computation.</div>
    </div>`;
}

function calcOtherIncome(){
  const savInt=n('savingsInt');
  const fdInt=n('fdInt');
  const rdInt=n('rdInt');
  const rental=n('rentalInc');
  const munTax=n('rentalMunTax');
  const hlInt=n('hlInt24b');
  const propType=v('propType');

  let hpIncome=0;
  let hpNote='';
  if(propType==='rented'){
    const NAV=rental-munTax;
    const stdDed=NAV*0.30;
    hpIncome=NAV-stdDed-hlInt;
    hpNote=`NAV: ${fmt(NAV)} | 30% Std Ded: ${fmt(stdDed)} | Loan Int: ${fmt(hlInt)} | HP Income: ${fmt(hpIncome)}`;
  } else if(propType==='self'){
    hpIncome=-Math.min(hlInt,200000);
    hpNote=`Self-Occupied: Loss from HP = ${fmt(Math.abs(hpIncome))} (max ₹2,00,000 deductible)`;
  }
  const hpEl=document.getElementById('hp-summary');
  if(hpEl&&hpNote) hpEl.innerHTML=`<div class="info-box info-green"><div class="info-box-icon">🏠</div><div>${hpNote}</div></div>`;

  const totalInt=savInt+fdInt+rdInt;
  const totalOther=totalInt+Math.max(0,hpIncome)+n('dividendInc')+n('otherInc')+(n('familyPension')-Math.min(n('familyPension')/3,25000));
  const el=document.getElementById('other-income-box');
  if(el) el.innerHTML=`
    <div class="highlight-box">
      <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px">OTHER INCOME PREVIEW</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">
        <div><div style="font-size:11px;color:var(--text3)">Interest Income</div><div style="font-weight:700">${fmt(totalInt)}</div></div>
        <div><div style="font-size:11px;color:var(--text3)">HP Income/Loss</div><div style="font-weight:700;color:${hpIncome<0?'var(--red)':'inherit'}">${fmt(hpIncome)}</div></div>
        <div><div style="font-size:11px;color:var(--text3)">Capital Gains</div><div style="font-weight:700">${fmt(n('stcg111a')+n('stcgOther')+n('ltcg112a')+n('ltcgOther'))}</div></div>
        <div><div style="font-size:11px;color:var(--text3)">Other</div><div style="font-weight:700">${fmt(n('dividendInc')+n('otherInc'))}</div></div>
      </div>
    </div>`;
  return {hpIncome, totalInt};
}

function calcDedTotal(){
  const ids80c=['lic','ppf','epf','elss','nsc','scss','sukanya','tuitionFees','hlPrincipal','fd5yr','stamps','nps1'];
  const gross80c=ids80c.reduce((s,id)=>s+(n(id)||0),0);
  const sec80c=Math.min(gross80c,150000);
  const nps1b=Math.min(n('nps1b')||0,50000);
  const selfMedMax=cb('selfSenior')?50000:25000;
  const parentMedMax=cb('parentSenior')?50000:25000;
  const selfMed=Math.min(n('selfMed')||0,selfMedMax);
  const parentMed=Math.min(n('parentMed')||0,parentMedMax);
  const preventive=Math.min(n('preventive')||0,5000);
  const sec80d=selfMed+parentMed+preventive;
  const sec80e=n('educLoan')||0;
  const sec80g=n('donation100')+(n('donation50')*0.5);
  const savInt=n('savingsInt')||0;
  const agecat=document.getElementById('agecat')?.value||'below60';
  const sec80tta=agecat==='below60'?Math.min(savInt,10000):0;
  const sec80ttb=agecat!=='below60'?Math.min(savInt+n('fdInt'),50000):0;
  const sec80tta_ttb=Math.max(sec80tta,sec80ttb);
  const sec80u=parseFloat(document.getElementById('disability80u')?.value)||0;
  const sec80dd=parseFloat(document.getElementById('disabilityDep')?.value)||0;
  const nps80ccd2=n('nps80ccd2')||0; // 80CCD(2) allowed in BOTH regimes
  const totalDed=sec80c+nps1b+sec80d+sec80e+sec80g+sec80tta_ttb+sec80u+sec80dd;

  const el=document.getElementById('ded-total-box');
  if(el) el.innerHTML=`
    <div class="summary-box">
      <h3>Deduction Summary (Old Regime)</h3>
      <div class="sum-row"><span class="sum-label">80C — Investments (${fmt(gross80c)} → capped)</span><span class="sum-val positive">${fmt(sec80c)}</span></div>
      <div class="sum-row"><span class="sum-label">80CCD(1B) — Additional NPS</span><span class="sum-val positive">${fmt(nps1b)}</span></div>
      <div class="sum-row"><span class="sum-label">80CCD(2) — Employer NPS (both regimes)</span><span class="sum-val positive">${fmt(nps80ccd2)}</span></div>
      <div class="sum-row"><span class="sum-label">80D — Health Insurance</span><span class="sum-val positive">${fmt(sec80d)}</span></div>
      <div class="sum-row"><span class="sum-label">80E — Education Loan Interest</span><span class="sum-val positive">${fmt(sec80e)}</span></div>
      <div class="sum-row"><span class="sum-label">80G — Donations</span><span class="sum-val positive">${fmt(sec80g)}</span></div>
      <div class="sum-row"><span class="sum-label">80TTA/TTB — Savings Interest</span><span class="sum-val positive">${fmt(sec80tta_ttb)}</span></div>
      <div class="sum-row"><span class="sum-label">80U / 80DD — Disability</span><span class="sum-val positive">${fmt(sec80u+sec80dd)}</span></div>
      <div class="sum-row"><span class="sum-label" style="font-size:14px;font-weight:700">Total Deductions (Chapter VI-A)</span><span class="sum-val highlight" style="font-size:18px">${fmt(totalDed)}</span></div>
    </div>`;

  const d80cEl=document.getElementById('ded80c-total');
  if(d80cEl) d80cEl.innerHTML=`Used: ${fmt(gross80c)} / ₹1,50,000`;

  ITR._sec80c=sec80c; ITR._nps1b=nps1b; ITR._sec80d=sec80d; ITR._sec80e=sec80e;
  ITR._sec80g=sec80g; ITR._sec80tta=sec80tta_ttb; ITR._sec80u=sec80u+sec80dd;
  ITR._totalDed=totalDed;
  return {sec80c,nps1b,sec80d,sec80e,sec80g,sec80tta_ttb,sec80u,sec80dd,totalDed,nps80ccd2};
}

// ═══════════════════════════════════════════════════
//  TAX COMPUTATION ENGINE
// ═══════════════════════════════════════════════════
function computeTax(){
  collectCurrentStep();
  const sal=getSalaryIncome();
  const oi=calcOtherIncome();
  const ded=calcDedTotal();
  const agecat=ITR.agecat||'below60';

  // Income components
  const salaryNet=sal.netSalary;
  const profTax=Math.min(n('profTax'),2500);
  const hpIncome=oi.hpIncome;
  const savInt=n('savingsInt');
  const fdInt=n('fdInt');
  const rdInt=n('rdInt');
  const rental=n('rentalInc');
  const munTax=n('rentalMunTax');
  const hlInt=Math.min(n('hlInt24b'),200000);
  const stcg111a=n('stcg111a');
  const stcgOther=n('stcgOther');
  const ltcg112a=n('ltcg112a');
  const ltcgOther=n('ltcgOther');
  const dividend=n('dividendInc');
  const otherInc=n('otherInc');
  const familyPension=n('familyPension');
  const fpExempt=Math.min(familyPension/3,25000);
  const nps80ccd2=n('nps80ccd2')||0; // 80CCD(2) employer NPS — allowed in BOTH regimes

  // ── OLD REGIME ──────────────────────────────────
  const stdDedOld=50000;
  const oldSalary=Math.max(0,salaryNet-profTax-stdDedOld);
  const oldHP=hpIncome; // includes 24b interest
  const oldOther=savInt+fdInt+rdInt+dividend+(familyPension-fpExempt)+otherInc;
  const old80TTA=Math.min(savInt,agecat==='below60'?10000:50000);
  const oldGrossTotal=oldSalary+Math.max(0,oldHP)+oldOther+stcgOther;
  const oldTaxable=Math.max(0,oldGrossTotal-ded.totalDed-nps80ccd2);

  // ── NEW REGIME ──────────────────────────────────
  const stdDedNew=75000; // Budget 2024 increase
  const newSalary=Math.max(0,salaryNet-profTax-stdDedNew);
  // New regime: NO 24b deduction at all (neither self-occ nor let-out). HP loss set-off not allowed.
  const newHP=0;
  const newOther=savInt+fdInt+rdInt+dividend+(familyPension-fpExempt)+otherInc;
  const newGrossTotal=newSalary+Math.max(0,newHP)+newOther+stcgOther;
  // New regime: only 80CCD(2) employer NPS contribution is allowed
  const newTaxable=Math.max(0,newGrossTotal-nps80ccd2);

  function slabTax(income,regime,age){
    let tax=0;
    if(regime==='old'){
      const basic=age==='above80'?500000:age==='60to80'?300000:250000;
      const slabs=[
        [basic,0],[500000,0.05],[1000000,0.20],[Infinity,0.30]
      ];
      let rem=income,prev=0;
      slabs.forEach(([upto,rate])=>{
        const band=Math.min(rem,upto-prev);
        tax+=Math.max(0,band)*rate;
        rem-=band; prev=upto;
      });
    } else {
      // New regime FY 2024-25
      const slabs=[[300000,0],[700000,0.05],[1000000,0.10],[1200000,0.15],[1500000,0.20],[Infinity,0.30]];
      let rem=income,prev=0;
      slabs.forEach(([upto,rate])=>{
        const band=Math.min(rem,upto-prev);
        tax+=Math.max(0,band)*rate;
        rem-=band; prev=upto;
      });
    }
    return tax;
  }

  // Old regime tax
  const oldBaseTax=slabTax(oldTaxable,'old',agecat);
  // 87A rebate OLD: if total income (incl special rates) <= 5L, rebate up to 12500 on slab tax only
  const oldTotalIncomeChk=oldTaxable+(stcg111a||0)+(ltcg112a||0)+(ltcgOther||0);
  const old87A=oldTotalIncomeChk<=500000?Math.min(oldBaseTax,12500):0;
  const oldAfterRebate=Math.max(0,oldBaseTax-old87A);
  // STCG / LTCG (special rates) — Budget 2024: STCG 111A @20%, LTCG 112A @12.5%, exemption ₹1,25,000
  const oldSTCG111aTax=stcg111a*0.20;
  const oldLTCG112aTax=Math.max(0,ltcg112a-125000)*0.125;
  const oldLTCGOtherTax=ltcgOther*0.20;
  const oldTotalBeforeSurcharge=oldAfterRebate+oldSTCG111aTax+oldLTCG112aTax+oldLTCGOtherTax;
  // Old regime surcharge: 10%/15%/25%/37% — max 37% for old regime
  const oldSurcharge=oldTaxable>5000000&&oldTaxable<=10000000?oldTotalBeforeSurcharge*0.10:oldTaxable>10000000&&oldTaxable<=20000000?oldTotalBeforeSurcharge*0.15:oldTaxable>20000000&&oldTaxable<=50000000?oldTotalBeforeSurcharge*0.25:oldTaxable>50000000?oldTotalBeforeSurcharge*0.37:0;
  const oldCess=(oldTotalBeforeSurcharge+oldSurcharge)*0.04;
  const oldTotalTax=oldTotalBeforeSurcharge+oldSurcharge+oldCess;

  // New regime tax
  const newBaseTax=slabTax(newTaxable,'new',agecat);
  // 87A rebate NEW (Budget 2024): ONLY on slab income, NOT on special rate (STCG/LTCG) income
  // Rebate up to ₹25,000 if taxable income (excl. special rates) <= ₹7,00,000
  const new87A=newTaxable<=700000?Math.min(newBaseTax,25000):0;
  const newAfterRebate=Math.max(0,newBaseTax-new87A);
  const newSTCG111aTax=stcg111a*0.20;
  const newLTCG112aTax=Math.max(0,ltcg112a-125000)*0.125;
  const newLTCGOtherTax=ltcgOther*0.20;
  const newTotalBeforeSurcharge=newAfterRebate+newSTCG111aTax+newLTCG112aTax+newLTCGOtherTax;
  // New regime surcharge: capped at 25% (NOT 37%) — Budget 2023 change retained
  const newSurcharge=newTaxable>5000000&&newTaxable<=10000000?newTotalBeforeSurcharge*0.10:newTaxable>10000000&&newTaxable<=20000000?newTotalBeforeSurcharge*0.15:newTaxable>20000000?newTotalBeforeSurcharge*0.25:0;
  const newCess=(newTotalBeforeSurcharge+newSurcharge)*0.04;
  const newTotalTax=newTotalBeforeSurcharge+newSurcharge+newCess;

  const tdsDeducted=n('tdsDeducted')||0;
  const advTax=n('advanceTax')||0;
  const selfAss=n('selfAssTax')||0;
  const totalTaxPaid=tdsDeducted+advTax+selfAss;

  const oldBalance=totalTaxPaid-oldTotalTax;
  const newBalance=totalTaxPaid-newTotalTax;

  return {
    oldTaxable,newTaxable,
    oldBaseTax,newBaseTax,
    old87A,new87A,
    oldAfterRebate,newAfterRebate,
    oldSTCG111aTax,oldLTCG112aTax,oldLTCGOtherTax,
    newSTCG111aTax,newLTCG112aTax,newLTCGOtherTax,
    oldSurcharge,newSurcharge,
    oldCess,newCess,
    oldTotalTax,newTotalTax,
    totalTaxPaid,oldBalance,newBalance,
    salaryNet,stdDedOld,stdDedNew,profTax,
    oldSalary,newSalary,oldHP,newHP,
    oldOther,newOther,
    totalDed:ded.totalDed,
    sec80c:ded.sec80c,nps1b:ded.nps1b,sec80d:ded.sec80d,sec80e:ded.sec80e,sec80g:ded.sec80g,
    sec80tta:ded.sec80tta_ttb,sec80u:ded.sec80u,sec80dd:ded.sec80dd,
    nps80ccd2,
    stcg111a,stcgOther,ltcg112a,ltcgOther
  };
}

        ${c.old87A>0?`<div class="slab-row" style="color:var(--green)"><span>87A Rebate</span><span></span><span>- ${fmt(c.old87A)}</span></div>`:''}
        ${c.oldSTCG111aTax>0?`<div class="slab-row"><span>STCG @20%</span><span></span><span>${fmt(c.oldSTCG111aTax)}</span></div>`:''}
        ${c.oldLTCG112aTax>0?`<div class="slab-row"><span>LTCG @12.5%</span><span></span><span>${fmt(c.oldLTCG112aTax)}</span></div>`:''}

function refundBox(c,recommended){
  const bal=recommended==='old'?c.oldBalance:c.newBalance;
  const tax=recommended==='old'?c.oldTotalTax:c.newTotalTax;
  if(bal>0) return `<div class="refund-box"><div style="font-size:12px;color:var(--green);font-weight:700;margin-bottom:6px">🎉 REFUND DUE (${recommended==='old'?'Old':'New'} Regime)</div><div style="font-size:30px;font-weight:700;color:var(--green)">${fmt(bal)}</div><div style="font-size:12px;color:var(--text3);margin-top:6px">Claim this refund by filing your ITR before 31st July 2025</div></div>`;
  if(bal<0) return `<div class="due-box"><div style="font-size:12px;color:var(--red);font-weight:700;margin-bottom:6px">⚠️ TAX STILL DUE</div><div style="font-size:30px;font-weight:700;color:var(--red)">${fmt(Math.abs(bal))}</div><div style="font-size:12px;color:var(--text3);margin-top:6px">Pay this before filing ITR to avoid interest u/s 234B/234C</div></div>`;
  return `<div class="refund-box"><div style="font-size:14px;font-weight:700;color:var(--green)">✅ Tax fully paid — No refund, no dues</div></div>`;
}

        taxableIncome:c.newTaxable,

        surcharge:c.newSurcharge,
        healthEducationCess:c.newCess,
        totalTaxLiability:c.newTotalTax
      }
    },
    taxPaidDetails:{
      tdsDeducted:n('tdsDeducted'),
      advanceTaxPaid:n('advanceTax'),
      selfAssessmentTax:n('selfAssTax'),
      totalTaxPaid:c.totalTaxPaid
    },
    filingRecommendation:{
      recommendedRegime:recommended,
      oldRegimeTax:c.oldTotalTax,
      newRegimeTax:c.newTotalTax,
      taxSavingByChoosingRecommended:Math.abs(c.oldTotalTax-c.newTotalTax),
      refundOrDue:{
        old:{amount:c.oldBalance,type:c.oldBalance>=0?'Refund':'Due'},
        new:{amount:c.newBalance,type:c.newBalance>=0?'Refund':'Due'}
      }
    }
  };
  const blob=new Blob([JSON.stringify(json,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`ITR_${(ITR.fullname||'Taxpayer').replace(/\s+/g,'_')}_AY2025-26.json`;
  a.click();
}
